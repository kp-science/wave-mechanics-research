<!-- Boss Page Template (climax fight)
     Use for: warprun.html (final boss · 3 phases · multi-ending)
     Reference: lessons/astronomy/ep03/warprun.html (1020 lines · complete implementation)

     This template shows the shell · most logic in EP03 boss page is reusable as-is.
     Just rename data + tweak phase names + customize antagonist.
-->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EP<NN> · BOSS · <BOSS NAME></title>
<link rel="stylesheet" href="../shared/book.css?v=6">
<link rel="stylesheet" href="_page-style.css">
<style>
  body { background:#02030a; color:#e8ecf8; overflow-x:hidden; position:relative; }
  body.shake { animation:bodyShake .35s; }
  @keyframes bodyShake {
    0%,100%{transform:translateX(0)} 20%{transform:translate(-7px,2px)}
    40%{transform:translate(6px,-3px)} 60%{transform:translate(-4px,3px)} 80%{transform:translate(3px,-2px)}
  }
  body.flash-red::before { content:''; position:fixed; inset:0;
    background:radial-gradient(ellipse at center, rgba(255,30,80,0.35), transparent 70%);
    pointer-events:none; z-index:25; animation:flashFade .4s; }
  @keyframes flashFade { from{opacity:1;} to{opacity:0;} }

  /* Starfield · CRITICAL z-index exclusions for FX */
  #starfield { position:fixed; inset:0; z-index:0; pointer-events:none; }
  body > *:not(#starfield):not(canvas):not(.projectile):not(.projectile-trail):not(.beam-fx):not(.dmg-pop):not(.phase-intro):not(.reward-modal) {
    position:relative; z-index:2;
  }

  /* Sticky Climax Bar (top) · Energy HUD MUST be here · clearly labeled */
  .climax-bar { position:sticky; top:0; z-index:30; padding:10px 14px;
    background:rgba(5,0,10,0.95); border-bottom:1px solid #ff5c7a; backdrop-filter:blur(10px); }
  .climax-bar .row1 { display:flex; justify-content:space-between; align-items:center; }
  .energy-hud { margin-top:8px; display:grid; grid-template-columns:auto 1fr auto; gap:10px; align-items:center; }
  .eh-label { font-family:Orbitron,sans-serif; font-size:10px; letter-spacing:0.18em; color:#7effb2;
    text-shadow:0 0 6px rgba(126,255,178,0.5); }
  .eh-bar { height:14px; background:rgba(0,0,0,0.6); border:1px solid #2a3050; border-radius:7px; overflow:hidden; }
  .eh-fill { height:100%; background:linear-gradient(90deg, #7effb2 0%, #ffcb6b 60%, #ff5c7a 100%);
    transition:width .35s cubic-bezier(.2,.7,.3,1); box-shadow:0 0 10px rgba(126,255,178,0.5); }
  .eh-text { font-family:Orbitron,monospace; font-size:14px; color:#fff; min-width:80px; text-align:right; }
  .supernova-timer { font-family:Orbitron,monospace; font-size:22px; color:#ff5c7a; letter-spacing:0.15em; }
  .supernova-timer.warn { animation:pulse 1s infinite; }
  @keyframes pulse { 50% { text-shadow:0 0 24px #ff5c7a, 0 0 40px #ff5c7a; transform:scale(1.06); } }

  /* Mystery box reward banner */
  .reward-banner { display:flex; align-items:center; gap:10px; padding:8px 12px; margin:10px 12px 0;
    background:linear-gradient(135deg, rgba(255,215,0,0.08), rgba(126,255,178,0.06));
    border:1px dashed rgba(255,215,0,0.5); border-radius:10px; font-size:12px; color:#ffd; }
  .reward-banner .gift { font-size:22px; animation:giftBob 1.8s ease-in-out infinite; }
  @keyframes giftBob { 50% { transform:translateY(-3px) rotate(-5deg); } }

  /* Boss arena */
  .arena { position:relative; padding:24px 12px 12px; margin:8px 12px;
    background:radial-gradient(ellipse at 50% 30%, rgba(185,128,255,0.18), rgba(2,3,10,0) 70%);
    border:2px solid #b980ff; border-radius:18px; overflow:hidden;
    box-shadow:inset 0 0 80px rgba(185,128,255,0.15); }

  /* Boss eye centerpiece */
  .boss-eye-wrap { position:relative; display:flex; justify-content:center; align-items:center; height:160px; margin:8px 0; }
  .boss-eye { position:relative; width:140px; height:140px; }
  .boss-eye .ring { position:absolute; inset:0; border-radius:50%; border:2px solid rgba(185,128,255,0.45);
    animation:ringSpin 18s linear infinite; }
  .boss-eye .ring.r2 { inset:14px; border-style:dashed; border-color:rgba(255,92,122,0.4); animation-duration:9s; animation-direction:reverse; }
  .boss-eye .ring.r3 { inset:28px; border-color:rgba(212,184,255,0.6); animation-duration:6s; }
  @keyframes ringSpin { to { transform:rotate(360deg); } }
  .boss-eye .iris { position:absolute; inset:38px; border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #ffd6e8 0%, #ff5c7a 25%, #b980ff 60%, #2a0d3a 100%);
    box-shadow:0 0 40px rgba(255,92,122,0.7), inset 0 0 20px rgba(0,0,0,0.6);
    animation:irisPulse 2.4s ease-in-out infinite; }
  @keyframes irisPulse { 50% { transform:scale(1.08); box-shadow:0 0 60px rgba(255,92,122,0.9); } }
  .boss-eye .pupil { position:absolute; top:50%; left:50%; width:24px; height:48px; transform:translate(-50%,-50%);
    background:#000; border-radius:50%; }
  .boss-eye .charge-arc { position:absolute; inset:-12px; border-radius:50%;
    background:conic-gradient(from -90deg, #ff5c7a 0%, transparent 0%);
    -webkit-mask:radial-gradient(circle, transparent 65%, #000 67%);
            mask:radial-gradient(circle, transparent 65%, #000 67%); }
  .boss-eye.danger .iris { animation:irisDanger 0.5s infinite; }
  @keyframes irisDanger { 50% { transform:scale(1.18); box-shadow:0 0 80px #ff1e50; filter:hue-rotate(-20deg); } }
  .boss-eye.hit .iris { animation:irisHit 0.4s; }
  @keyframes irisHit { 0%{transform:scale(1.2); filter:brightness(2.5);} 100%{transform:scale(1);} }

  /* HP bar */
  .hp-bar { height:24px; background:rgba(0,0,0,0.6); border:1px solid #444; border-radius:12px; overflow:hidden; position:relative; }
  .hp-fill { height:100%; background:linear-gradient(90deg,#7effb2 0%,#ffcb6b 50%,#ff5c7a 100%);
    transition:width .5s cubic-bezier(.2,.7,.3,1); box-shadow:0 0 14px rgba(255,92,122,0.5); }
  .hp-text { position:absolute; inset:0; text-align:center; font-family:Orbitron,monospace; font-size:13px; color:#fff;
    line-height:24px; letter-spacing:0.15em; text-shadow:0 1px 2px #000; }

  /* Question + choices */
  .question { padding:18px; margin:12px;
    background:linear-gradient(160deg, rgba(10,15,30,0.9), rgba(22,27,58,0.85));
    border:1px solid rgba(120,140,220,0.4); border-radius:14px; }
  .choices { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .choice { padding:16px; background:linear-gradient(135deg, rgba(100,216,255,0.08), rgba(185,128,255,0.05));
    border:2px solid rgba(120,140,220,0.4); color:#e8ecf8; border-radius:12px; cursor:pointer; }
  .choice.correct { border-color:#7effb2; background:rgba(126,255,178,0.22); }
  .choice.wrong { border-color:#ff5c7a; background:rgba(255,92,122,0.22); }

  /* FX layers (z-index above content) */
  .projectile { position:fixed; pointer-events:none; z-index:60; width:18px; height:18px;
    border-radius:50%; background:radial-gradient(circle, #fff 20%, #7effb2 50%, transparent 80%);
    box-shadow:0 0 20px #7effb2; }
  .beam-fx { position:fixed; pointer-events:none; z-index:55; height:6px; transform-origin:0 50%;
    background:linear-gradient(90deg, transparent, #ff1e50 30%, #fff 50%, #ff5c7a 70%, transparent);
    box-shadow:0 0 20px #ff1e50; opacity:0; animation:beamFire 0.45s ease-out forwards; }
  @keyframes beamFire { 0%{opacity:0; transform:scaleX(0);} 30%{opacity:1; transform:scaleX(1);} 100%{opacity:0;} }
  .dmg-pop { position:fixed; pointer-events:none; z-index:9999; font-family:Orbitron,sans-serif; font-weight:900; font-size:32px;
    color:#ff5c7a; text-shadow:0 0 16px #ff5c7a, 0 2px 4px #000; animation:dmgFloat 1.1s ease-out forwards; }
  @keyframes dmgFloat { 0%{opacity:0;transform:scale(0.5);} 18%{opacity:1;transform:scale(1.3);} 100%{opacity:0;transform:translateY(-70px) scale(1);} }

  /* Phase intro overlay */
  .phase-intro { position:fixed; inset:0; z-index:9000; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(ellipse at center, rgba(185,128,255,0.3), rgba(2,3,10,0.95) 70%);
    backdrop-filter:blur(8px); animation:phaseIn 0.4s; }
  @keyframes phaseIn { from{opacity:0;} }
  .phase-intro .card { padding:30px 50px; border:3px solid #b980ff; border-radius:18px;
    background:rgba(10,5,20,0.85); box-shadow:0 0 60px rgba(185,128,255,0.6);
    animation:phaseCard 0.6s; text-align:center; }
  @keyframes phaseCard { 0%{transform:scale(0.5) rotateY(180deg); opacity:0;} 100%{transform:scale(1) rotateY(0); opacity:1;} }

  /* Mystery box modal */
  .reward-modal { position:fixed; inset:0; z-index:9100; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(ellipse at center, rgba(255,215,0,0.18), rgba(2,3,10,0.94) 70%); backdrop-filter:blur(8px); }
  /* ... see warprun.html for full modal styles ... */

  /* Ending gate + buttons (full styles in EP03 warprun.html) */
</style>
</head>
<body data-page="p18" data-type="mixed">

<canvas id="starfield"></canvas>

<div class="climax-bar">
  <div class="row1">
    <div><span style="font-size:11px;color:#9aa3c0;font-family:Orbitron,sans-serif;letter-spacing:0.2em;">SUPERNOVA</span>
         <span class="supernova-timer" id="svTimer">3:00</span></div>
    <div style="font-size:12px;color:#9aa3c0;">EP<NN> · BOSS · <span id="phaseName">PHASE 1</span></div>
  </div>
  <div class="energy-hud">
    <div class="eh-label">⚡ ENERGY (พลังยานเรา)</div>
    <div class="eh-bar"><div class="eh-fill" id="ehFill" style="width:100%"></div></div>
    <div class="eh-text"><span id="ehVal">300</span> / <span id="ehMax">300</span></div>
  </div>
</div>

<div class="reward-banner">
  <div class="gift">🎁</div>
  <div><b>กล่องสุ่มท้ายเกม</b> · ผิด 0 → <b style="color:#7effb2;">เต็ม 3 ชิ้น</b> · ผิด 1-3 → <b style="color:#ffcb6b;">2 ชิ้น (จำนวนลด)</b> · ผิด 4+ → <b style="color:#ff8fa5;">1 ชิ้น</b></div>
</div>

<div class="arena" id="arena">
  <div class="arena-head" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <div style="font-family:Orbitron,sans-serif;font-size:18px;letter-spacing:0.2em;color:#b980ff;">👁 <ANTAGONIST></div>
    <div class="phase-tag" id="phaseTag" style="padding:4px 12px;background:rgba(185,128,255,0.18);border:1px solid #b980ff;border-radius:14px;font-size:11px;color:#d4b8ff;font-family:Orbitron,sans-serif;">PHASE 1 / 3 · <NAME></div>
  </div>

  <div class="boss-eye-wrap">
    <div class="boss-eye" id="bossEye">
      <div class="glow"></div>
      <div class="ring"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
      <div class="iris"></div>
      <div class="pupil"></div>
      <div class="charge-arc" id="chargeArc"></div>
    </div>
  </div>

  <div class="hp-bar">
    <div class="hp-fill" id="hpFill" style="width:100%"></div>
    <div class="hp-text" id="hpText">300 / 300</div>
  </div>
  <div class="charge-label" id="chargeLbl" style="font-size:10px;color:#9aa3c0;margin-top:4px;">⚡ ชาร์จยิง...</div>

  <div class="void-claim" id="voidClaim" style="padding:10px 14px;background:rgba(255,92,122,0.12);border-left:3px solid #ff5c7a;color:#ffb5c2;font-style:italic;border-radius:0 10px 10px 0;font-size:14px;margin-top:8px;">VOID: "<initial false claim>"</div>
</div>

<div class="stats" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px 12px;margin:12px;background:rgba(22,27,58,0.8);border-radius:10px;">
  <div class="stat"><div class="lbl">ENERGY</div><div class="val" id="energyVal">300</div></div>
  <div class="stat"><div class="lbl">PHOTON</div><div class="val" id="photonVal">0</div></div>
  <div class="stat"><div class="lbl">METER</div><div class="val" id="meterVal">60%</div></div>
</div>

<div class="question" id="questionBox">
  <div class="q-text" id="qText">loading...</div>
  <div class="choices" id="choices"></div>
</div>

<div class="boosts" id="boosts" style="padding:8px 12px;margin:8px 12px;"></div>
<div class="feedback" id="feedback" style="text-align:center;padding:12px;margin:8px 12px;border-radius:10px;font-family:Orbitron,sans-serif;min-height:22px;"></div>

<div id="endingGate"></div>

<div class="finish-wrap" id="finishWrap" style="display:none;padding:14px 12px;">
  <button class="submit-btn" id="submitBtn" onclick="submitResults()" style="display:block;width:100%;padding:16px;border-radius:12px;background:rgba(126,255,178,0.18);border:2px solid #7effb2;color:#7effb2;font-family:Orbitron,sans-serif;font-weight:700;letter-spacing:0.12em;margin-bottom:8px;cursor:pointer;">💾 ส่งผลงาน</button>
  <button class="next-btn" id="nextBtn" onclick="goNext()" disabled style="display:block;width:100%;padding:16px;border-radius:12px;background:rgba(100,216,255,0.12);border:2px dashed #64d8ff;color:#64d8ff;font-family:Orbitron,sans-serif;font-weight:700;letter-spacing:0.12em;cursor:pointer;">▶ ไปต่อ · รอประตูเปิด</button>
</div>

<script src="../shared/firebase-config.js"></script>
<script src="./config.js"></script>
<script src="../../shared/pace-client.js"></script>
<script src="../shared/sync-client.js"></script>
<script src="../shared/voidhunter.js"></script>
<script src="../shared/photon.js?v=2"></script>
<script src="../shared/role-view.js"></script>
<script src="../shared/transition.js"></script>
<script src="../shared/ep<NN>-boot.js?v=2"></script>
<script>
/* For full implementation reference:
   lessons/astronomy/ep03/warprun.html (~1020 lines · all the logic)

   Key components you need to copy:
   1. starfield (canvas init + setInterval tick)
   2. state object (phase, hpLeft, energy, streak, etc.)
   3. renderAll() / renderQuestion() / renderBoosts()
   4. answer(idx, correct, cat) → energy cost, projectile, damage, streak
   5. spawnProjectile(fromBtn, crit, onHit) → setInterval-based animation
   6. spawnBeam() → boss → energy stat
   7. tickCharge() → charge arc + danger state + vhShoot()
   8. vhShoot() → beam + damage + shake/flash + shield check
   9. nextPhase() → showPhaseIntro() → continue
   10. victory() / supernovaFail() / loseEnergy() → endings
   11. showEndingGate() → final choice (send/skip beacon)
   12. endWith(code) → ending text + reward modal
   13. computeWrongCount() → tier
   14. showRewardBox() / openMysteryBox() / closeRewardBox()
   15. submitResults() / Gate.markSubmitted() / goNext()

   Customize per EP:
   - <ANTAGONIST> name + visual eye color/style
   - phase names + voidClaims (per phase)
   - questions (5 per phase · cover misconception of that phase)
   - ending text
   - mystery box reward pool
*/
</script>
</body></html>
