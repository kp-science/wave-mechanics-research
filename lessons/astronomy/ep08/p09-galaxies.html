<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>EP08 · p09 · Galaxies</title>
<link rel="stylesheet" href="_page-style.css" />
<style>
  .gal-canvas { width:100%; height:300px; background:#050108; border:1px solid var(--line);
    border-radius:12px; display:block; cursor:crosshair; }
  .place-ctrl { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:10px 0; }
  .place-ctrl .chip { font-size:13px; }
</style>
</head>
<body data-page="p09">
<div class="page">
  <div class="act-badge">ACT B · 5/8 · GALAXIES</div>
  <div id="epochHost"></div>

  <details class="story-tab" open><summary>📖 Story Tab</summary><div id="storySpine"></div></details>

  <canvas id="galCanvas" class="gal-canvas"></canvas>

  <div class="howto">
    <h4>🎮 EXPERIMENT · จัด dark matter scaffold</h4>
    <ul>
      <li>คลิก <b>5 จุด</b> บน canvas เพื่อวาง dark matter halo</li>
      <li>กาแล็กซีจะก่อตัวรอบ halo ที่วางถูก · gas ดึงเข้า → spiral arms</li>
      <li>misconception M-FINAL-2: เอกภพ <em>ไม่มีขอบ</em> · structure กระจายทุกทิศ</li>
    </ul>
  </div>

  <div class="place-ctrl">
    <span class="lbl">วาง halo:</span>
    <span id="halocount">0/5</span>
    <button class="btn ghost" id="resetBtn">↻ ลบทั้งหมด</button>
  </div>

  <div class="result-host" id="resultHost"></div>
  <button class="btn" id="submitBtn" disabled>ส่ง · ปล่อย gravity</button>
</div>

<script src="../shared/kpa-tracker-v2.js"></script>
  <script src="../shared/telemetry-sync.js"></script>
<script src="../shared/hud-v2.js"></script>
<script src="../shared/coin-energy.js"></script>
<script src="../shared/mystery-box-v2.js"></script>
<script src="../shared/research-instruments.js"></script>
<script src="../shared/pbl-frame.js"></script>
<script src="../shared/starfield.js"></script>
<script src="../shared/reveal-after-submit.js"></script>
<script src="../shared/timeline-viz.js"></script>
<script src="config.js"></script>
<script src="../shared/ep08-page.js"></script>
<script src="../shared/ep08-boot.js?v=99"></script>
<script>
  EP08Boot.init({ pageId:'p09' });
  TimelineViz.epochCard(document.getElementById('epochHost'), 4);
  EP08Page.story('p09');
  EP08Page.markVisit('p09');

  const c = document.getElementById('galCanvas');
  function fit(){ c.width = c.clientWidth; c.height = 300; }
  fit(); window.addEventListener('resize', fit);
  const ctx = c.getContext('2d');
  const halos = [];
  let formed = false;

  function draw(){
    ctx.fillStyle = '#050108'; ctx.fillRect(0,0,c.width,c.height);
    // bg stars
    for (let i=0;i<60;i++){
      ctx.fillStyle = 'rgba(255,245,227,0.3)';
      ctx.fillRect(Math.random()*c.width, Math.random()*c.height, 1, 1);
    }
    halos.forEach((h, i) => {
      const grad = ctx.createRadialGradient(h.x, h.y, 0, h.x, h.y, 60);
      grad.addColorStop(0, formed ? 'rgba(255,245,227,0.8)' : 'rgba(106,58,255,0.5)');
      grad.addColorStop(0.4, formed ? 'rgba(255,216,74,0.4)' : 'rgba(106,58,255,0.2)');
      grad.addColorStop(1, 'rgba(106,58,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(h.x, h.y, 60, 0, Math.PI*2); ctx.fill();
      if (formed){
        // spiral
        ctx.strokeStyle = 'rgba(255,216,74,0.5)';
        ctx.lineWidth = 1.5;
        ctx.save(); ctx.translate(h.x, h.y); ctx.rotate(h.r);
        for (let arm=0; arm<3; arm++){
          ctx.beginPath();
          for (let s=0; s<30; s++){
            const a = arm * (Math.PI*2/3) + s * 0.18;
            const r = s * 1.2;
            const px = Math.cos(a)*r, py = Math.sin(a)*r*0.5;
            if (s===0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
          }
          ctx.stroke();
        }
        ctx.restore();
        h.r += 0.005;
      }
    });
    requestAnimationFrame(draw);
  }
  draw();

  c.addEventListener('click', e => {
    if (formed || halos.length >= 5) return;
    const rect = c.getBoundingClientRect();
    halos.push({ x: e.clientX - rect.left, y: e.clientY - rect.top, r: 0 });
    document.getElementById('halocount').textContent = halos.length + '/5';
    document.getElementById('submitBtn').disabled = halos.length < 5;
  });

  document.getElementById('resetBtn').onclick = () => {
    halos.length = 0;
    document.getElementById('halocount').textContent = '0/5';
    document.getElementById('submitBtn').disabled = true;
    formed = false;
  };

  document.getElementById('submitBtn').onclick = () => {
    formed = true;
    if (window.KPA) {
      KPA.log('K','K1','dark matter scaffold placed');
      KPA.research('darkMatterScaffold', { halos: halos.length });
    }
    EP08Page.submit({
      title:'🌌 GALAXIES BORN · 1 Gyr',
      body:`<p>dark matter halo คือโครงคงตัว · gas ดึงเข้ารอบ halo · ก่อตัวเป็นกาแล็กซี</p>
            <p>structure กระจายทุกทิศ · ไม่มี<em>ขอบ</em> (M-FINAL-2)</p>
            <p>มีบางอย่างเคลื่อนไหวใน fluctuation ใกล้เธอ...</p>`
    });
    document.getElementById('submitBtn').disabled = true;
  };
</script>
</body>
</html>
