<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>EP08 · p18 · Disable 4 · Galaxy</title>
<link rel="stylesheet" href="_page-style.css" />
<style>
  .disable-canvas { width:100%; height:260px; background:#050108; border:1px solid var(--cosmic-purple);
    border-radius:14px; display:block; }
  .keys-pool { display:flex; gap:6px; flex-wrap:wrap; margin:10px 0; }
  .keys-pool .keychip { background:var(--bg-card); border:1px solid var(--line); border-radius:8px;
    padding:6px 10px; font-size:13px; cursor:pointer; }
  .keys-pool .keychip.used { opacity:.4; }
  .progress { height:10px; background:var(--bg-mid); border-radius:5px; margin:10px 0; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--cosmic-purple),var(--genesis-gold)); transition:width .3s; }
</style>
</head>
<body data-page="p18">
<div class="page">
  <div class="act-badge">ACT C · 6/8 · DISABLE 4</div>
  <h1>⚙️ Disable Engine #4 · GALAXY</h1>

  <details class="story-tab" open><summary>📖 Story Tab</summary><div id="storySpine"></div></details>

  <canvas id="canvas" class="disable-canvas"></canvas>

  <div class="howto">
    <h4>🎮 MINI-BOSS · Lock Dark Matter Scaffold</h4>
    <ul>
      <li>VOID พยายามกระจาย dark matter</li>
      <li>ใช้ keys หมวด <b>Solar/Tech</b> 4 ตัวที่ถูก type</li>
    </ul>
  </div>

  <div class="row between">
    <div>HP: <b id="hp" style="color:var(--genesis-gold);font-size:20px;">6/6</b></div>
    <div>Lock: <b id="prog">0/4</b></div>
  </div>
  <div class="progress"><div class="progress-fill" id="bar"></div></div>

  <div class="keys-pool" id="keyPool"></div>

  <div class="result-host" id="resultHost"></div>
</div>

<script src="../shared/kpa-tracker-v2.js"></script>
<script src="../shared/hud-v2.js"></script>
<script src="../shared/coin-energy.js"></script>
<script src="../shared/mystery-box-v2.js"></script>
<script src="../shared/research-instruments.js"></script>
<script src="../shared/pbl-frame.js"></script>
<script src="../shared/starfield.js"></script>
<script src="../shared/reveal-after-submit.js"></script>
<script src="../shared/s1-keyring.js"></script>
<script src="config.js"></script>
<script src="../shared/ep08-page.js"></script>
<script src="../shared/ep08-boot.js"></script>
<script>
  EP08Boot.init({ pageId:'p18' });
  EP08Page.story('p18');
  EP08Page.markVisit('p18');

  const c = document.getElementById('canvas');
  function fit(){ c.width = c.clientWidth; c.height = 260; }
  fit(); window.addEventListener('resize', fit);
  const ctx = c.getContext('2d');
  let stable = 0, hp = 6, done = false, t = 0;
  function draw(){
    t += 0.012;
    ctx.fillStyle = '#050108'; ctx.fillRect(0,0,c.width,c.height);
    const intensity = stable / 4;
    const cx = c.width/2, cy = c.height/2;
    // dark matter halos forming
    for (let i=0;i<5;i++){
      const ang = i * (Math.PI*2/5) + t*0.3;
      const dx = cx + Math.cos(ang)*70*(1-intensity*0.3);
      const dy = cy + Math.sin(ang)*60*(1-intensity*0.3);
      const grad = ctx.createRadialGradient(dx, dy, 0, dx, dy, 40);
      grad.addColorStop(0, intensity > 0.5 ? 'rgba(255,216,74,0.5)' : 'rgba(106,58,255,0.5)');
      grad.addColorStop(1, 'rgba(106,58,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(dx, dy, 40, 0, Math.PI*2); ctx.fill();
    }
    if (intensity > 0.5){
      // spiral arms
      ctx.strokeStyle = `rgba(255,216,74,${intensity})`;
      ctx.lineWidth = 1.5;
      for (let arm=0; arm<3; arm++){
        ctx.beginPath();
        for (let s=0; s<40; s++){
          const a = arm*(Math.PI*2/3) + s*0.16 + t*0.5;
          const r = s*1.8;
          const px = cx + Math.cos(a)*r, py = cy + Math.sin(a)*r*0.5;
          if (s===0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.stroke();
      }
    }
    requestAnimationFrame(draw);
  }
  draw();

  const pool = document.getElementById('keyPool');
  S1Keyring.all().forEach(k => {
    const chip = document.createElement('button');
    chip.className = 'keychip';
    chip.dataset.id = k.id;
    chip.dataset.cat = k.cat;
    chip.dataset.owned = k.owned;
    chip.innerHTML = k.icon + ' ' + k.name;
    if (!k.owned) chip.style.opacity = '0.3';
    pool.appendChild(chip);
  });

  pool.addEventListener('click', e => {
    if (done) return;
    const chip = e.target.closest('.keychip'); if (!chip) return;
    if (chip.classList.contains('used')) return;
    if (chip.dataset.owned !== 'true'){ alert('🔒 ยังไม่ได้ปลด'); return; }
    const valid = ['solar','tech'];
    if (valid.includes(chip.dataset.cat)){
      stable++; chip.classList.add('used'); chip.style.borderColor = '#ffd84a';
    } else {
      hp--; chip.classList.add('used'); chip.style.borderColor = '#ff6a6a';
    }
    document.getElementById('hp').textContent = hp + '/6';
    document.getElementById('prog').textContent = stable + '/4';
    document.getElementById('bar').style.width = (stable/4*100) + '%';
    if (stable >= 4) finish(true);
    else if (hp <= 0) finish(false);
  });

  function finish(ok){
    done = true;
    if (window.KPA){
      KPA.log('K','K1','disable galaxy engine ' + (ok?'ok':'fail'));
      KPA.research('disableEngine4', { ok });
    }
    if (ok) EP08Boot.grantEpoch(4);
    EP08Page.submit({ ok,
      title: ok ? '✅ ALL 4 ENGINES DISABLED' : '💀 HP หมด',
      body: ok ? '<p>VOID Prime ถอยเข้าเงา · ไป Hall of Spinoff ทบทวน EP07</p>' : ''
    });
  }
</script>
</body>
</html>
