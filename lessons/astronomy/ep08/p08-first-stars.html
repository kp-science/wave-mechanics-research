<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
<title>EP08 · p08 · First Stars</title>
<link rel="stylesheet" href="_page-style.css" />
<style>
  .stars-canvas { width:100%; height:240px; background:#050108; border:1px solid var(--line);
    border-radius:12px; display:block; }
  .gas-controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:10px 0; }
</style>
</head>
<body data-page="p08">
<div class="page">
  <div class="act-badge">ACT B · 4/8 · FIRST STARS</div>
  <div id="epochHost"></div>

  <details class="story-tab" open><summary>📖 Story Tab</summary><div id="storySpine"></div></details>

  <canvas id="starsCanvas" class="stars-canvas"></canvas>

  <div class="howto">
    <h4>🎮 EXPERIMENT · จุดประกายดาวดวงแรก</h4>
    <ul>
      <li>ปรับ <b>density</b> · ทำให้ gas รวมตัวจน gravity ดึงเข้าจุด</li>
      <li>กดปุ่ม <b>IGNITE</b> เมื่อพร้อม · ดูฟิวชันเริ่ม</li>
      <li>สังเกต: หลังดาวติดไฟ · จักรวาลมีแสงครั้งแรก ~ 200 Myr</li>
    </ul>
  </div>

  <div class="gas-controls">
    <span class="lbl">gas density:</span>
    <input type="range" id="dens" min="1" max="100" value="10" style="flex:1;min-width:200px;" />
    <span id="densVal">10</span>
    <button class="btn" id="igniteBtn" disabled>🌟 IGNITE</button>
  </div>

  <div class="result-host" id="resultHost"></div>
</div>

<script src="../shared/kpa-tracker-v2.js"></script>
<script src="../shared/hud-v2.js"></script>
<script src="../shared/coin-energy.js"></script>
<script src="../shared/mystery-box-v2.js"></script>
<script src="../shared/research-instruments.js"></script>
<script src="../shared/pbl-frame.js"></script>
<script src="../shared/starfield.js"></script>
<script src="../shared/reveal-after-submit.js"></script>
<script src="../shared/timeline-viz.js"></script>
<script src="config.js"></script>
<script src="../shared/ep08-page.js"></script>
<script src="../shared/ep08-boot.js"></script>
<script>
  EP08Boot.init({ pageId:'p08' });
  TimelineViz.epochCard(document.getElementById('epochHost'), 3);
  EP08Page.story('p08');
  EP08Page.markVisit('p08');

  const c = document.getElementById('starsCanvas');
  function fit(){ c.width = c.clientWidth; c.height = 240; }
  fit(); window.addEventListener('resize', fit);
  const ctx = c.getContext('2d');
  let density = 10, ignited = false, igniteTime = 0;
  const dens = document.getElementById('dens');
  const igniteBtn = document.getElementById('igniteBtn');
  dens.addEventListener('input', () => {
    density = +dens.value;
    document.getElementById('densVal').textContent = density;
    igniteBtn.disabled = density < 70;
  });

  // particles representing gas
  const parts = Array.from({length:80}).map(()=>({
    x: Math.random()*c.width, y: Math.random()*c.height,
    vx: (Math.random()-.5)*0.5, vy: (Math.random()-.5)*0.5
  }));

  function loop(){
    ctx.fillStyle = 'rgba(5,1,8,0.3)';
    ctx.fillRect(0,0,c.width,c.height);
    const cx = c.width/2, cy = c.height/2;
    parts.forEach(p => {
      const dx = cx - p.x, dy = cy - p.y;
      const d = Math.sqrt(dx*dx + dy*dy) + 1;
      const pull = density * 0.0006;
      p.vx += (dx/d) * pull;
      p.vy += (dy/d) * pull;
      p.vx *= 0.985; p.vy *= 0.985;
      p.x += p.vx; p.y += p.vy;
      ctx.fillStyle = ignited ? '#ffd84a' : '#fff5e3';
      ctx.globalAlpha = ignited ? 0.9 : 0.6;
      ctx.beginPath(); ctx.arc(p.x, p.y, ignited ? 1.5 : 1, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
    if (ignited){
      const t = Date.now() - igniteTime;
      const r = Math.min(120, t * 0.05);
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      grad.addColorStop(0, '#fff5e3');
      grad.addColorStop(0.4, 'rgba(255,216,74,0.8)');
      grad.addColorStop(1, 'rgba(255,138,61,0)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    }
    requestAnimationFrame(loop);
  }
  loop();

  igniteBtn.onclick = () => {
    ignited = true;
    igniteTime = Date.now();
    if (window.KPA) {
      KPA.log('K','K1','first stars ignited at density ' + density);
      KPA.research('firstStars', { density, ignited:true });
    }
    EP08Page.submit({
      title:'✨ FIRST STARS · 200 Myr',
      body:`<p>ดาวดวงแรกในจักรวาล · ฟิวชันเริ่มทำงาน · จักรวาลมีแสงครั้งแรกในรอบ 200 ล้านปี</p>
            <p>ดาวพวกนี้ใหญ่มาก · อายุสั้น · ระเบิดเป็น<b>ซูเปอร์โนวา</b>สร้างธาตุหนัก</p>`
    });
    igniteBtn.disabled = true;
  };
</script>
</body>
</html>
