<!DOCTYPE html>
<html lang="th"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>EP05 · P15 · Flare vs CME</title>
<link rel="stylesheet" href="../shared/book.css?v=6">
<link rel="stylesheet" href="_page-style.css">
<style>
.bin-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:10px 0; }
.bin { padding:14px; border-radius:14px; min-height:200px; }
.bin.flare { background:rgba(255,203,107,0.06); border:2px dashed #ffcb6b; }
.bin.cme   { background:rgba(185,128,255,0.06); border:2px dashed #b980ff; }
.bin h4 { margin:0 0 8px; font-family:Orbitron,monospace; letter-spacing:.1em; }
.bin.flare h4 { color:#ffcb6b; }
.bin.cme h4 { color:#b980ff; }
.stmt-pool { display:flex; flex-direction:column; gap:6px; padding:10px; border-radius:12px; background:rgba(20,28,52,0.6); margin:10px 0; }
.stmt { padding:10px 12px; border-radius:10px; cursor:grab; touch-action:none;
        background:rgba(255,255,255,.05); border:1px solid rgba(120,140,220,.3); font-size:13px; }
.stmt.placed { display:none; }
.bin .stmt { cursor:default; background:rgba(255,255,255,0.04); }
.bin.flare .stmt.correct { border-color:#7effb2; background:rgba(126,255,178,0.1); }
.bin.cme .stmt.correct   { border-color:#7effb2; background:rgba(126,255,178,0.1); }
.bin .stmt.wrong { border-color:#ff5c7a; background:rgba(255,92,122,0.12); }
</style>
</head>
<body data-page="p16" data-type="puzzle">
<div class="page">
  <span class="lbl puzzle">⚡💥 CLASSIFY · M4</span>
  <h1>แยก Flare vs CME · 8 ข้อความ</h1>
  <div class="tags"><span class="kpa-chip">K3</span><span class="kpa-chip">M4</span></div>

  <div data-mission-brief></div>

  <div class="card">
    <div class="bin-grid">
      <div class="bin flare" data-cat="flare">
        <h4>⚡ SOLAR FLARE</h4>
        <div class="bin-body" id="binFlare"></div>
      </div>
      <div class="bin cme" data-cat="cme">
        <h4>💥 CME</h4>
        <div class="bin-body" id="binCme"></div>
      </div>
    </div>
    <div class="stmt-pool" id="pool"></div>
    <div style="display:flex;gap:8px;">
      <button class="ghost" id="checkBtn">เปรียบเทียบ</button>
      <button class="ghost" id="resetBtn">↺ ล้าง</button>
      <span id="result" class="muted" style="align-self:center;"></span>
    </div>
  </div>

  <details class="tc">
    <summary>🎓 Teacher Cue · P15</summary>
    <div>เน้น M4: flare = แสง/รังสี (8 นาที) · CME = พลาสมา (1-3 วัน)</div>
  </details>

  <div class="btn-pair">
    <button class="submit-btn" id="submitBtn">📤 ส่งผล</button>
    <button class="next-btn" id="nextBtn" disabled>🔒 ส่งผลก่อน</button>
  </div>
</div>

<script src="../shared/firebase-config.js"></script>
<script src="./config.js"></script>
<script src="../../shared/pace-client.js"></script>
<script src="../shared/sync-client.js"></script>
<script src="../shared/photon.js?v=3"></script>
<script src="../shared/role-view.js"></script>
<script src="../shared/touch-drag.js?v=1"></script>
<script src="../shared/starfield.js?v=1"></script>
<script src="../shared/audio.js?v=2"></script>
<script src="../shared/mission-brief.js?v=1"></script>
<script src="../shared/mystery-box.js?v=2"></script>
<script src="../shared/ep05-boot.js?v=1"></script>
<script>
const STMTS = [
  { id:1, txt:'เดินทางถึงโลกใน ~8 นาที', cat:'flare' },
  { id:2, txt:'พลาสมามวลหลายพันล้านตันพุ่งออก', cat:'cme' },
  { id:3, txt:'ใช้เวลา 1-3 วันถึงโลก', cat:'cme' },
  { id:4, txt:'เป็นแสง + รังสี X-ray + UV', cat:'flare' },
  { id:5, txt:'รบกวนคลื่นวิทยุ HF + GPS drift ทันที', cat:'flare' },
  { id:6, txt:'ทำให้เกิด geomagnetic storm + grid blackout', cat:'cme' },
  { id:7, txt:'ดาวเทียมเสียหายถ้าโดนเต็ม ๆ', cat:'cme' },
  { id:8, txt:'เกิดจาก magnetic reconnection ใกล้ sunspot', cat:'flare' },
];
const placed = {}; // id -> cat
const pool = document.getElementById('pool');
const binFlare = document.getElementById('binFlare');
const binCme = document.getElementById('binCme');

function render(){
  pool.innerHTML=''; binFlare.innerHTML=''; binCme.innerHTML='';
  STMTS.forEach(s=>{
    const t = document.createElement('div'); t.className='stmt'; t.textContent = s.txt; t.dataset.id = s.id;
    if(placed[s.id]){
      t.classList.add('placed'); // hide from pool, render to bin
      const clone = t.cloneNode(true); clone.classList.remove('placed');
      (placed[s.id]==='flare'?binFlare:binCme).appendChild(clone);
    } else {
      t.draggable=true; t.ondragstart=e=>e.dataTransfer.setData('text/plain', String(s.id));
      if(window.TouchDrag) TouchDrag.makeDraggable(t, ()=>String(s.id));
      pool.appendChild(t);
    }
  });
}
render();
document.querySelectorAll('.bin').forEach(b=>{
  b.ondragover=e=>e.preventDefault();
  b.ondrop=e=>{ e.preventDefault(); const id=Number(e.dataTransfer.getData('text/plain')); if(id){ placed[id]=b.dataset.cat; render(); SFX&&SFX.play('snap'); }};
  if(window.TouchDrag) TouchDrag.makeDropTarget(b, id=>{ placed[Number(id)]=b.dataset.cat; render(); SFX&&SFX.play('snap'); });
});
document.getElementById('resetBtn').onclick=()=>{ for(const k in placed) delete placed[k]; render(); document.getElementById('result').textContent=''; document.querySelectorAll('.bin .stmt').forEach(e=>e.classList.remove('correct','wrong')); };
document.getElementById('checkBtn').onclick=()=>{
  let c=0;
  STMTS.forEach(s=>{
    if(placed[s.id]===s.cat) c++;
  });
  // mark visually
  [binFlare, binCme].forEach(b=>{
    [...b.children].forEach(el=>{
      const id = Number(el.dataset.id); const s = STMTS.find(x=>x.id===id);
      if(placed[id]===s.cat) el.classList.add('correct'); else el.classList.add('wrong');
    });
  });
  document.getElementById('result').textContent=`ถูก ${c}/8`;
  document.getElementById('result').style.color = c>=7?'#7effb2':'#ffcb6b';
  if(c>=7) SFX&&SFX.play('correct'); else SFX&&SFX.play('wrong');
};
setTimeout(()=>{
  Submit.wirePair({
    page:'p16', nextHref:'p17-earth-impact.html',
    getPayload(){ let c=0; STMTS.forEach(s=>{ if(placed[s.id]===s.cat) c++; }); return {correct:c, total:8}; },
    validate(p){ if(p.correct<7){ alert('ต้องถูก ≥ 7/8'); return false; } return true; },
    isPerfect(p){ return p.correct===8; },
  });
},200);
</script>
</body></html>
