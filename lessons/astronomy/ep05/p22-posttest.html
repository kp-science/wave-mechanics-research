<!DOCTYPE html>
<html lang="th"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>EP05 · P21 · Post-test</title>
<link rel="stylesheet" href="../shared/book.css?v=6">
<link rel="stylesheet" href="_page-style.css">
</head>
<body data-page="p22" data-type="reflection">
<div class="page">
  <span class="lbl reflection">📋 POST-TEST · 5 ข้อ</span>
  <h1>Post-test · วัด gain</h1>
  <div class="tags"><span class="kpa-chip">M1-M7</span></div>

  <div class="card">
    <div class="narr">ตอบให้ครบ · ระบบจะเปรียบเทียบกับ pre-test (p01) อัตโนมัติ</div>
  </div>

  <div id="quizArea"></div>

  <div class="card gold" id="gainCard" style="display:none;">
    <h3>📈 ผลเปรียบเทียบ</h3>
    <div id="gainBody"></div>
  </div>

  <div class="btn-pair">
    <button class="submit-btn" id="submitBtn">📤 ส่งคำตอบ</button>
    <button class="next-btn" id="nextBtn" disabled>🔒 ส่งผลก่อน</button>
  </div>

  <details class="tc">
    <summary>🎓 Teacher Cue · P21</summary>
    <div>เปรียบเทียบกับ p01 · ดู gain ต่อ M1-M7 · ใช้สรุปการสอน</div>
  </details>
</div>

<script src="../shared/firebase-config.js"></script>
<script src="./config.js"></script>
<script src="../../shared/pace-client.js"></script>
<script src="../shared/sync-client.js"></script>
<script src="../shared/photon.js?v=3"></script>
<script src="../shared/role-view.js"></script>
<script src="../shared/starfield.js?v=1"></script>
<script src="../shared/audio.js?v=2"></script>
<script src="../shared/mission-brief.js?v=1"></script>
<script src="../shared/mystery-box.js?v=2"></script>
<script src="../shared/ep05-boot.js?v=1"></script>
<script>
// Post-test 5 ข้อ · ใช้โจทย์เดียวกับ Pre-test (p01) เพื่อวัด gain ตรง 1:1
const QS = [
  { m:'M1', q:'ดวงอาทิตย์ผลิตพลังงานด้วยกระบวนการใด?',
    a:['การเผาไหม้แก๊สไฮโดรเจน','นิวเคลียร์ฟิวชัน p-p chain','การหมุนเหวี่ยงแกน','การชนของอุกกาบาต'], c:1 },
  { m:'M2', q:'ชั้นใดของดวงอาทิตย์ "ร้อนกว่า" photosphere (5,780 K)?',
    a:['Core เท่านั้น','Corona (~1-2 ล้าน K)','ไม่มีชั้นไหนร้อนกว่า','Chromosphere เย็นกว่าทุกชั้น'], c:1 },
  { m:'M3', q:'sunspot (จุดมืดบนดวงอาทิตย์) คืออะไร?',
    a:['รูในดวงอาทิตย์','ดาวเคราะห์น้อยที่บังหน้า','บริเวณที่ T ต่ำเพราะสนามแม่เหล็กแรงปิดกั้นการพา','รอยแตก'], c:2 },
  { m:'M4', q:'solar flare กับ CME ต่างกันอย่างไร?',
    a:['เหมือนกันทุกประการ','flare = แสง ~8 นาที · CME = พลาสมา 1-3 วัน','flare เดินทางเร็วกว่าแสง','CME ไม่เคยกระทบโลก'], c:1 },
  { m:'K3', q:'CME ที่กระทบโลกแบบรุนแรงอาจทำให้เกิดอะไร?',
    a:['ไฟฟ้าโครงข่ายล่ม + ดาวเทียมเสียหาย','ฝนตกหนักทั่วโลก','ระดับน้ำทะเลสูงขึ้น','แผ่นดินไหวรุนแรง'], c:0 },
];
const area = document.getElementById('quizArea');
QS.forEach((q,i)=>{
  const card = document.createElement('div'); card.className='card';
  card.innerHTML = `<div class="q-prompt">ข้อ ${i+1} · <span style="font-size:11px;color:#9aa3c0;">[${q.m}]</span> ${q.q}</div>
    <div class="choice-row" data-q="${i}">
      ${q.a.map((t,k)=>`<label><input type="radio" name="q${i}" value="${k}"> <span>${t}</span></label>`).join('')}
    </div>`;
  area.appendChild(card);
});

setTimeout(()=>{
  Submit.wirePair({
    page:'p22', nextHref:'p23-sequencer.html',
    getPayload(){
      const ans={}; let correct=0;
      QS.forEach((q,i)=>{
        const v=document.querySelector(`input[name="q${i}"]:checked`);
        const val=v?Number(v.value):-1;
        ans['q'+i]={m:q.m, ans:val, correct:val===q.c};
        if(val===q.c) correct++;
      });
      return {answers:ans, correct, total:QS.length};
    },
    validate(p){ if(Object.values(p.answers).some(a=>a.ans===-1)){ alert('กรุณาตอบให้ครบ'); return false; } return true; },
    isPerfect(p){ return p.correct===p.total; },
    onSubmit(){
      // gain summary
      const post = Submit.load('p21');
      const pre  = Submit.load('p01');
      let preCorrect = pre && pre.correct ? pre.correct : 0;
      const postCorrect = post && post.correct ? post.correct : 0;
      const gain = postCorrect - preCorrect;
      document.getElementById('gainCard').style.display='block';
      document.getElementById('gainBody').innerHTML =
        `<div style="font-size:14px;color:#ffcb6b;">Pre: <b>${preCorrect}/${QS.length}</b> · Post: <b>${postCorrect}/${QS.length}</b></div>
         <div style="font-size:18px;color:${gain>=2?'#7effb2':'#ffcb6b'}; font-family:Orbitron,monospace; margin-top:6px;">Gain: +${gain}</div>`;
      Chain.set('p21Correct', postCorrect);
      // 🎁 Mystery Box · posttest = checkpoint สำคัญ · ก่อนเข้า boss
      const wrongs = QS.length - postCorrect;
      if (window.MysteryBox && MysteryBox.roll) {
        setTimeout(() => MysteryBox.roll({ wrongs, page:'p22' }), 800);
      }
    }
  });
},200);
</script>
</body></html>
