<!DOCTYPE html>
<html lang="th"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>EP05 · P01 · Pre-test</title>
<link rel="stylesheet" href="../shared/book.css?v=6">
<link rel="stylesheet" href="_page-style.css">
</head>
<body data-page="p01" data-type="reflection">
<div class="page">
  <span class="lbl reflection">📋 BASELINE · ก่อนเริ่ม</span>
  <h1>Pre-test · 8 ข้อ</h1>
  <div class="tags">
    <span class="kpa-chip">M1-M7</span><span class="kpa-chip">K1-K5</span>
  </div>
  <div class="card">
    <div class="narr">ตอบตามที่คิด · ผิดได้ ไม่ตัดคะแนน · ใช้วัดความเข้าใจก่อนเรียน</div>
  </div>

  <div id="quizArea"></div>

  <div class="btn-pair">
    <button class="submit-btn" id="submitBtn">📤 ส่งคำตอบ</button>
    <button class="next-btn" id="nextBtn" disabled>🔒 ส่งผลก่อน</button>
  </div>

  <details class="tc">
    <summary>🎓 Teacher Cue · P01</summary>
    <div>เก็บ baseline · เปรียบเทียบกับ post-test ที่ p21 · ดู gain ต่อ misconception</div>
  </details>
</div>

<script src="../shared/firebase-config.js"></script>
<script src="./config.js"></script>
<script src="../../shared/pace-client.js"></script>
<script src="../shared/sync-client.js"></script>
<script src="../shared/photon.js?v=3"></script>
<script src="../shared/role-view.js"></script>
<script src="../shared/starfield.js?v=1"></script>
<script src="../shared/audio.js?v=2"></script>
<script src="../shared/mission-brief.js?v=1"></script>
<script src="../shared/mystery-box.js?v=2"></script>
<script src="../shared/ep05-boot.js?v=1"></script>
<script>
const QS = [
  { m:'M1', q:'ดวงอาทิตย์ผลิตพลังงานด้วย?', a:['การเผาไหม้แก๊สไฮโดรเจน','นิวเคลียร์ฟิวชัน p-p chain','การหมุนเหวี่ยง','การชนของอุกกาบาต'], c:1 },
  { m:'M2', q:'ชั้นใดของดวงอาทิตย์ "ร้อนกว่า" photosphere?', a:['Core เท่านั้น','Corona','ไม่มีชั้นไหนร้อนกว่า','Chromosphere'], c:1 },
  { m:'M3', q:'sunspot คืออะไร?', a:['รูในดวงอาทิตย์','ดาวเคราะห์น้อยที่ผ่าน','บริเวณที่อุณหภูมิต่ำกว่ารอบ ๆ เพราะแม่เหล็กแรง','รอยแตกบนผิว'], c:2 },
  { m:'M4', q:'solar flare กับ CME ต่างกันอย่างไร?', a:['เหมือนกัน','flare = แสง 8 นาที · CME = พลาสมา 1-3 วัน','flare เร็วกว่าแสง','CME ไม่ถึงโลก'], c:1 },
  { m:'M5', q:'aurora เกิดได้แม้ไม่มี CME · จริงหรือเท็จ?', a:['จริง · solar wind ปกติก็ทำให้เกิดได้','เท็จ · ต้อง CME รุนแรงเท่านั้น','เกิดเฉพาะตอนสุริยุปราคา','เกิดทุกคืน'], c:0 },
  { m:'M6', q:'ระบบสุริยะเกิดอย่างไร?', a:['ดาวเคราะห์เกิดทีละดวง','เนบิวลายุบ + accretion ใน disk พร้อมกัน','พระเจ้าสร้าง','เกิดจากดวงอาทิตย์แตก'], c:1 },
  { m:'M7', q:'Habitable zone หมายถึง?', a:['ระยะใกล้ดาวฤกษ์ที่สุด','ระยะที่น้ำเป็นของเหลวอยู่ได้','โซนที่มีออกซิเจน','โซนใกล้ขั้วของดาวฤกษ์'], c:1 },
  { m:'K3', q:'CME ที่กระทบโลกอาจทำให้เกิด?', a:['ไฟฟ้าโครงข่ายล่ม + ดาวเทียมเสียหาย','ฝนตกหนัก','ระดับน้ำทะเลสูงขึ้น','แผ่นดินไหว'], c:0 },
];
const area = document.getElementById('quizArea');
QS.forEach((q,i) => {
  const card = document.createElement('div'); card.className='card';
  card.innerHTML = `<div class="q-prompt">ข้อ ${i+1} · <span style="font-size:11px;color:#9aa3c0;">[${q.m}]</span> ${q.q}</div>
    <div class="choice-row" data-q="${i}">
      ${q.a.map((t,k)=>`<label><input type="radio" name="q${i}" value="${k}"> <span>${t}</span></label>`).join('')}
    </div>`;
  area.appendChild(card);
});
setTimeout(() => {
  Submit.wirePair({
    page:'p01', nextHref:'p02-intro-quest.html',
    getPayload(){
      const ans={}; let correct=0;
      QS.forEach((q,i)=>{
        const v=document.querySelector(`input[name="q${i}"]:checked`);
        const val = v?Number(v.value):-1;
        ans['q'+i]={m:q.m, ans:val, correct:val===q.c};
        if(val===q.c) correct++;
      });
      return {answers:ans, correct, total:QS.length};
    },
    validate(p){
      if(Object.values(p.answers).some(a=>a.ans===-1)){
        alert('กรุณาตอบให้ครบทุกข้อ'); return false;
      }
      return true;
    },
    isPerfect(p){ return p.correct===p.total; },
    onSubmit(tag){
      // 🎁 Mystery Box on submit · wrongs = total - correct
      let correct = 0;
      QS.forEach((q,i) => {
        const v = document.querySelector(`input[name="q${i}"]:checked`);
        if (v && Number(v.value) === q.c) correct++;
      });
      const wrongs = QS.length - correct;
      if (window.MysteryBox && MysteryBox.roll) {
        setTimeout(() => MysteryBox.roll({ wrongs, page:'p01' }), 600);
      }
    }
  });
}, 200);
</script>
</body></html>
