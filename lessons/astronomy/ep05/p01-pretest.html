<script>
// Pre-test 5 ข้อ · misconception (M) + วัตถุประสงค์ K (ความรู้)
const QS = [
  { m:'M1', q:'ดวงอาทิตย์ผลิตพลังงานด้วยกระบวนการใด?',
    a:['การเผาไหม้แก๊สไฮโดรเจน','นิวเคลียร์ฟิวชัน p-p chain','การหมุนเหวี่ยงแกน','การชนของอุกกาบาต'], c:1 },
  { m:'M2', q:'ชั้นใดของดวงอาทิตย์ "ร้อนกว่า" photosphere (5,780 K)?',
    a:['Core เท่านั้น','Corona (~1-2 ล้าน K)','ไม่มีชั้นไหนร้อนกว่า','Chromosphere เย็นกว่าทุกชั้น'], c:1 },
  { m:'M3', q:'sunspot (จุดมืดบนดวงอาทิตย์) คืออะไร?',
    a:['รูในดวงอาทิตย์','ดาวเคราะห์น้อยที่บังหน้า','บริเวณที่ T ต่ำเพราะสนามแม่เหล็กแรงปิดกั้นการพา','รอยแตกบนผิว'], c:2 },
  { m:'M4', q:'solar flare กับ CME ต่างกันอย่างไร?',
    a:['เหมือนกันทุกประการ','flare = แสง ~8 นาที · CME = พลาสมา 1-3 วัน','flare เดินทางเร็วกว่าแสง','CME ไม่เคยกระทบโลก'], c:1 },
  { m:'K3', q:'CME ที่กระทบโลกแบบรุนแรงอาจทำให้เกิดอะไร?',
    a:['ไฟฟ้าโครงข่ายล่ม + ดาวเทียมเสียหาย','ฝนตกหนักทั่วโลก','ระดับน้ำทะเลสูงขึ้น','แผ่นดินไหวรุนแรง'], c:0 },
];
const area = document.getElementById('quizArea');
QS.forEach((q,i) => {
  const card = document.createElement('div'); card.className='card';
  card.innerHTML = `<div class="q-prompt">ข้อ ${i+1} · <span style="font-size:11px;color:#9aa3c0;">[${q.m}]</span> ${q.q}</div>
    <div class="choice-row" data-q="${i}">
      ${q.a.map((t,k)=>`<label><input type="radio" name="q${i}" value="${k}"> <span>${t}</span></label>`).join('')}
    </div>`;
  area.appendChild(card);
});
setTimeout(() => {
  Submit.wirePair({
    page:'p01', nextHref:'p02-intro-quest.html',
    getPayload(){
      const ans={}; let correct=0;
      QS.forEach((q,i)=>{
        const v=document.querySelector(`input[name="q${i}"]:checked`);
        const val = v?Number(v.value):-1;
        ans['q'+i]={m:q.m, ans:val, correct:val===q.c};
        if(val===q.c) correct++;
      });
      // sync to backend (Astronomy-2569 sheet)
      if (window.EPSync) {
        const epAnswers = QS.map((q,i) => ({
          id:'Q'+(i+1), mcode:q.m, ans:ans['q'+i].ans, correct:ans['q'+i].correct
        }));
        EPSync.submit({ ep:5, test:'pre', answers: epAnswers });
      }
      return {answers:ans, correct, total:QS.length};
    },
    validate(p){
      if(Object.values(p.answers).some(a=>a.ans===-1)){
        alert('กรุณาตอบให้ครบทุกข้อ'); return false;
      }
      return true;
    },
    isPerfect(p){ return p.correct===p.total; },
    onSubmit(tag){
      // 🎁 Mystery Box on submit · wrongs = total - correct
      let correct = 0;
      QS.forEach((q,i) => {
        const v = document.querySelector(`input[name="q${i}"]:checked`);
        if (v && Number(v.value) === q.c) correct++;
      });
      const wrongs = QS.length - correct;
      if (window.MysteryBox && MysteryBox.roll) {
        setTimeout(() => MysteryBox.roll({ wrongs, page:'p01' }), 600);
      }
    }
  });
}, 200);
</script>
</body></html>
