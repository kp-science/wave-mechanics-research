<!DOCTYPE html>
<html lang="th"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>EP05 · P22 · Story Sequencer</title>
<link rel="stylesheet" href="../shared/book.css?v=99">
<link rel="stylesheet" href="_page-style.css">
<style>
.seq-track { display:flex; flex-direction:column; gap:8px; margin:10px 0; }
.seq-slot { display:grid; grid-template-columns:50px 1fr; gap:10px; align-items:center; padding:12px; border-radius:10px;
            background:rgba(100,216,255,0.05); border:1px dashed rgba(100,216,255,0.4); min-height:48px; }
.seq-slot .num { font-family:Orbitron,monospace; color:#ffcb6b; font-size:18px; text-align:center; }
.seq-slot.filled { background:rgba(255,138,61,0.1); border-style:solid; border-color:#ff8a3d; }
.seq-slot.correct { background:rgba(126,255,178,0.14); border-color:#7effb2; }
.seq-slot.wrong { animation:shake .4s; }
.seq-pool { display:flex; flex-wrap:wrap; gap:8px; padding:12px; border-radius:12px; background:rgba(20,28,52,0.6); margin:10px 0; }
.seq-tag { padding:8px 12px; border-radius:10px; cursor:grab; touch-action:none; font-size:13px;
           background:rgba(255,203,107,.12); border:1px solid rgba(255,203,107,.4); }
</style>
</head>
<body data-page="p23" data-type="puzzle">
<div class="page">
  <span class="lbl puzzle">🧩 STORY SEQUENCER</span>
  <h1>เรียงเหตุการณ์ทั้ง EP05</h1>
  <div class="tags"><span class="kpa-chip">P3</span></div>

  <div class="card">
    <h3>📖 ลากเรียง 8 เหตุการณ์ตามลำดับเรื่อง</h3>
    <div class="seq-track" id="track"></div>
    <div class="seq-pool" id="pool"></div>
    <div style="display:flex;gap:8px;">
      <button class="ghost" id="checkBtn">เปรียบเทียบ</button>
      <button class="ghost" id="resetBtn">↺ ล้าง</button>
      <span id="result" class="muted" style="align-self:center;"></span>
    </div>
  </div>

  <div class="btn-pair">
    <button class="submit-btn" id="submitBtn">📤 ส่งผล</button>
    <button class="next-btn" id="nextBtn" disabled>🔒 ส่งผลก่อน</button>
  </div>
</div>

<script src="../shared/firebase-config.js"></script>
<script src="./config.js"></script>

<script src="../../shared/pace-client.js"></script><script src="../../shared/kpdb.js"></script><script src="../../shared/pace-resolver.js"></script>
<script src="../shared/sync-client.js"></script>
<script src="../shared/photon.js?v=3"></script>
<script src="../shared/role-view.js"></script>
<script src="../shared/touch-drag.js?v=1"></script>
<script src="../shared/starfield.js?v=1"></script>
<script src="../shared/audio.js?v=2"></script>
<script src="../shared/mission-brief.js?v=1"></script>
<script src="../shared/mystery-box.js?v=2"></script>
<script src="../shared/ep05-boot.js?v=99"></script>
<script>
const events = [
  { id:1, txt:'พ่อเตือน · CME 18 ชม. มาทางโลก' },
  { id:2, txt:'เรียนกำเนิดระบบสุริยะ + 5 เขต' },
  { id:3, txt:'ศึกษา 6 ชั้นดวงอาทิตย์ + paradox อุณหภูมิ' },
  { id:4, txt:'5 ปรากฏการณ์ + ลำดับ event chain' },
  { id:5, txt:'แยก flare/CME + อิทธิพลต่อโลก' },
  { id:6, txt:'อ่านบันทึกพ่อ · VOID เร่ง CME' },
  { id:7, txt:'เลือกจุดเบี่ยง L1' },
  { id:8, txt:'ฝ่า SOLAR STORM · กู้โลก' },
];
const slots = events.map((e,i)=>({ pos:i+1, expect:e.id, filled:null }));
const track = document.getElementById('track');
const pool = document.getElementById('pool');
function render(){
  track.innerHTML='';
  slots.forEach((s,i)=>{
    const div=document.createElement('div'); div.className='seq-slot' + (s.filled?' filled':'');
    const ev = s.filled ? events.find(e=>e.id===s.filled) : null;
    div.innerHTML=`<div class="num">${s.pos}</div><div>${ev?ev.txt:'<span class="muted">— ลากมาวาง —</span>'}</div>`;
    div.ondragover=e=>e.preventDefault();
    div.ondrop=e=>{ e.preventDefault(); const id=Number(e.dataTransfer.getData('text/plain')); if(id){ s.filled=id; render(); SFX&&SFX.play('snap'); }};
    if(window.TouchDrag) TouchDrag.makeDropTarget(div, id=>{ s.filled=Number(id); render(); SFX&&SFX.play('snap'); });
    track.appendChild(div);
  });
  pool.innerHTML='';
  events.slice().sort(()=>0).forEach(ev=>{
    if(slots.find(s=>s.filled===ev.id)) return;
    const t=document.createElement('div'); t.className='seq-tag'; t.textContent=ev.txt;
    t.draggable=true; t.ondragstart=e=>e.dataTransfer.setData('text/plain', String(ev.id));
    if(window.TouchDrag) TouchDrag.makeDraggable(t, ()=>String(ev.id));
    pool.appendChild(t);
  });
}
render();
document.getElementById('resetBtn').onclick=()=>{ slots.forEach(s=>s.filled=null); render(); document.getElementById('result').textContent=''; };
document.getElementById('checkBtn').onclick=()=>{
  let c=0;
  slots.forEach((s,i)=>{
    const div=track.children[i];
    if(s.filled===s.expect){ div.classList.add('correct'); c++; }
    else if(s.filled){ div.classList.add('wrong'); setTimeout(()=>div.classList.remove('wrong'),500); s.filled=null; }
  });
  render();
  document.getElementById('result').textContent=`ถูก ${c}/8`;
  document.getElementById('result').style.color = c===8?'#7effb2':'#ffcb6b';
  if(c===8) SFX&&SFX.play('correct'); else SFX&&SFX.play('wrong');
};
setTimeout(()=>{
  Submit.wirePair({
    page:'p23', nextHref:'p24-shop.html',
    getPayload(){ let c=0; slots.forEach(s=>{ if(s.filled===s.expect) c++; }); return {correct:c, total:8}; },
    validate(p){ if(p.correct<8){ alert('ต้องเรียงถูกครบ 8/8'); return false; } return true; },
    isPerfect(p){ return p.correct===8; },
    onSubmit(){
      // 🎁 Mystery Box · sequencer = สรุปก่อน shop · ตามคำขอ research checkpoints
      if (window.MysteryBox && MysteryBox.roll) {
        let c = 0; slots.forEach(s => { if(s.filled === s.expect) c++; });
        setTimeout(() => MysteryBox.roll({ wrongs: 8 - c, page:'p23' }), 600);
      }
    },
  });
},200);
</script>
</body></html>
