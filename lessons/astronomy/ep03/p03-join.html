<!DOCTYPE html>
<html lang="th"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>EP03 · P03 · VOIDHUNTER · Password</title>
<link rel="stylesheet" href="../shared/book.css?v=6">
<link rel="stylesheet" href="_page-style.css">
<style>
  .radar { position:relative; width:100%; height:200px; background:radial-gradient(circle at center, rgba(126,255,178,0.1), #000 70%); border:2px solid #7effb2; border-radius:12px; overflow:hidden; }
  .radar .sweep { position:absolute; top:50%; left:50%; width:50%; height:2px; background:linear-gradient(90deg,transparent,#7effb2); transform-origin:left center; animation:sweep 3s linear infinite; }
  @keyframes sweep { to { transform:rotate(360deg); } }
  .radar .hunter { position:absolute; top:30%; right:20%; font-size:28px; animation:pulse 1s infinite; }
  @keyframes pulse { 50% { transform:scale(1.3);color:#ff5c7a; } }
  .radar .us { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:20px; color:#7effb2; }
  .password-input { width:100%; padding:16px; background:rgba(0,0,0,0.5); border:2px solid #ffcb6b; color:#ffcb6b; border-radius:10px; font-family:Orbitron,monospace; font-size:24px; letter-spacing:0.4em; text-align:center; text-transform:uppercase; }
</style>
</head>
<body data-page="p03" data-type="setup">
<div class="page">
  <div class="lbl mixed">🚨 JUMP SCARE</div>
  <h1>VOIDHUNTER ตามมา</h1>

  <div class="card" style="border-color:#ff5c7a;">
    <div class="radar">
      <div class="sweep"></div>
      <div class="us">🛸</div>
      <div class="hunter">⚠️</div>
    </div>
    <div class="narrative" style="margin-top:10px;">🚨 <b>ALARM · UNKNOWN VESSEL</b> · ห่าง 5 นาที · เข้าหาเรา</div>
    <span class="void-voice">LEMAÎTRE: "ระบุ<b>รหัส</b>เข้าระบบยาน · ล็อกประตู!"</span>
  </div>

  <div class="card">
    <h3>🔑 รหัสเข้ายาน · คือชื่อที่เจอจาก SOS</h3>
    <input type="text" class="password-input" id="pwInput" maxlength="4" placeholder="ARYA" autocapitalize="characters">
    <div class="status" id="pwStatus"></div>
  </div>

  <div class="btn-pair">
    <button class="submit-btn" id="submitBtn">💾 ยืนยันรหัส</button>
    <button class="next-btn" id="nextBtn" disabled>🔒 รอ</button>
  </div>
  <div class="gate-hint">💡 ดูจดหมาย P01 หรือ SOS P02 · ชื่ออะไร?</div>
</div>

<script src="../shared/firebase-config.js"></script>
<script src="./config.js"></script>
<script src="../../shared/pace-client.js"></script>
<script src="../shared/sync-client.js"></script>
<script src="../shared/voidhunter.js"></script>
<script src="../shared/photon.js?v=2"></script>
<script src="../shared/role-view.js"></script>
<script src="../shared/ep03-boot.js?v=2"></script>
<script>
const expected = (Chain.get('ARYA') || 'ARYA').toUpperCase();

document.getElementById('submitBtn').onclick = () => {
  const val = document.getElementById('pwInput').value.toUpperCase().trim();
  const ok = val === expected;
  const btn = document.getElementById('submitBtn');
  if (ok) {
    document.getElementById('pwStatus').innerHTML = '<div class="ok">✓ เข้าระบบยาน · Photon Bank เปิด</div>';
    btn.classList.add('done'); btn.disabled = true; btn.textContent = '✓ เข้าแล้ว';
    Photon.add(10, 'unlock-ship');
    Submit.record('p03', { password: val, correct: true, at: Date.now() });
    // enable next
    const nb = document.getElementById('nextBtn');
    Gate.soloMode(nb, 'p04-parallax.html');
    if (window.PaceClient) Gate.wireButton('p03', nb, 'p04-parallax.html');
  } else {
    document.getElementById('pwStatus').innerHTML = '<div class="bad">✗ รหัสผิด · ลองอีกครั้ง</div>';
  }
};
</script>
</body></html>
