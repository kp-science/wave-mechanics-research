<div id="ebMount" style="margin:14px 0;"></div>
<script>
(function(){
  var el = document.getElementById('ebMount');
  if(!el || !window.ExplainBack) return;
  ExplainBack.mount(el, {
    pageId: document.body.dataset.page,
    prompt: 'อธิบาย · ทำไมโลกไม่ใช่ใหญ่ที่สุด',
    words: ['พฤหัส', '11 เท่า', 'ขนาด', 'รัศมี', 'โลก', 'ดาวยักษ์', 'M3', 'misconception', 'ดาวเคราะห์ใหญ่ที่สุด', 'ระบบสุริยะ'],
    required: ['พฤหัส', '11 เท่า', 'โลก', 'ดาวยักษ์'],
    indicator: 'K3'
  });
})();
</script>


<div id="cgMount" style="margin:14px 0;"></div>
<script>
(function(){
  var el = document.getElementById('cgMount');
  if(!el || !window.ConfidenceGate) return;
  ConfidenceGate.mount(el, {
    pageId: document.body.dataset.page,
    onConfirm: function(){
      var nb = document.getElementById('nextBtn');
      if (nb) { nb.disabled = false; nb.classList.add('gate-open'); nb.scrollIntoView({behavior:'smooth',block:'center'}); }
    }
  });
  // lock next until confirmed
  setTimeout(function(){
    var nb = document.getElementById('nextBtn');
    if (nb && !nb.disabled) {
      nb.dataset.cgLocked = '1';
      nb.disabled = true;
    }
  }, 250);
})();
</script>

  <div class="btn-pair">

<script>
Phase3.mount({

    { txt:'เพราะส่วนใหญ่ของปริมาตรเป็น H+He แต่<b>มีแก่นแข็ง</b>อยู่ตรงกลาง', correct:true },

setTimeout(() => {
  Gate.wireButton('p09c', document.querySelector('.next-btn'), 'p09d-giants-gate.html', { requireSubmit:true });
}, 200);
