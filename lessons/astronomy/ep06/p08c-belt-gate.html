<div id="ljMount" style="margin:14px 0;"></div>
<script>
(function(){

  Journal.mount(el, {
    pageId: document.body.dataset.page,
    sceneTitle: 'จดสมุด · 3-2-1 ปิด scene',
    learnedChips: ['Belt อยู่ 2.2-3.2 AU', 'ระยะเฉลี่ย ~1M km', 'พฤหัสรบกวน', 'Ceres = ดาวเคราะห์แคระ', 'โล่งมาก ไม่แน่น', 'ยานบินผ่านง่าย'],
    useChips: ['ไม่กลัวยานชน asteroid', 'อธิบายภาพยนต์ผิดความจริง', 'รู้แหล่งดาวตก', 'สนใจ NASA OSIRIS-REx'],
    askChips: ['Ceres มีน้ำไหม', 'ขุดทองในแถบนี้ได้ไหม', 'ทำไม Ceres กลม', 'พฤหัสกระทบโลกไหม']
  });
})();
</script>


<div id="cgMount" style="margin:14px 0;"></div>
<script>
(function(){
  var el = document.getElementById('cgMount');
  if(!el || !window.ConfidenceGate) return;
  ConfidenceGate.mount(el, {
    pageId: document.body.dataset.page,
    onConfirm: function(){
      var nb = document.getElementById('nextBtn');
      if (nb) { nb.disabled = false; nb.classList.add('gate-open'); nb.scrollIntoView({behavior:'smooth',block:'center'}); }
    }
  });
  // lock next until confirmed
  setTimeout(function(){
    var nb = document.getElementById('nextBtn');
    if (nb && !nb.disabled) {
      nb.dataset.cgLocked = '1';
      nb.disabled = true;
    }
  }, 250);
})();
</script>

<script>
const QS = [
  { q:'ระยะเฉลี่ยระหว่าง asteroid?', a:['ติดกัน','~1 ล้าน กม.'], c:1 },
  { q:'ทำไม belt ไม่รวมเป็นดาว?', a:['แรงโน้มถ่วงพฤหัสรบกวน','เป็นน้ำแข็ง'], c:0 },
  { q:'ดาวที่ใหญ่สุดใน belt?', a:['Vesta','Ceres'], c:1 },
  { q:'belt อยู่ระหว่าง?', a:['อังคาร-พฤหัส','โลก-ดาวอังคาร'], c:0 },
  { q:'asteroid มีกี่ดวง (D > 1 km)?', a:['~ 100','~ 1,000,000'], c:1 },
];
const stage = document.getElementById('stage');
let cur = 0, correctCount = 0;

function spawnRock(idx){
  const r = document.createElement('div'); r.className='rock-obj'; r.id='rock'+idx;
  r.style.left = (15 + idx*16) + '%';
  r.style.top = (35 + (idx%2)*15) + '%';
  r.textContent = idx+1;
  stage.appendChild(r);
}
QS.forEach((_,i) => spawnRock(i));

function showQ(idx){
  if(idx >= QS.length){ finish(); return; }
  const q = QS[idx];
  const host = document.getElementById('qHost');
  host.innerHTML = `<div class="q-card"><div class="q-prompt">หิน ${idx+1}/5: ${q.q}</div><div id="optHost" class="opts" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px;"></div></div>`;
  const opts = host.querySelector('#optHost');
  q.a.forEach((t, i) => {
    const b = document.createElement('button'); b.className='ghost';
    b.style.cssText='padding:10px; font-family:inherit; letter-spacing:0; font-weight:400;';
    b.textContent = t;
    b.onclick = () => {
      const rock = document.getElementById('rock'+idx);
      if(i === q.c){
        rock.classList.add('cleared','correct');
        correctCount++;
        if(window.SFX) SFX.play('correct');
      } else {
        rock.classList.add('wrong');
        QuestState.decreaseEta(0.4);
        if(window.SFX) SFX.play('wrong');
      }
      // move ship forward
      document.getElementById('ship').style.left = (10 + (idx+1)*16) + '%';
      cur = idx+1;
      setTimeout(() => showQ(cur), 600);
    };
    opts.appendChild(b);
  });
}
showQ(0);

function finish(){
  document.getElementById('qHost').innerHTML = '';
  const r = document.getElementById('resultHost');
  if(correctCount >= 4){
    QuestState.grant('gs4');
    QuestState.decreaseEta(EP_CONFIG.voidEtaPerScene||0.6);
    r.innerHTML = `<div class="card green">✓ <b>BELT NAVIGATED</b> · ${correctCount}/5 ถูก · ปลด <b style="color:#ffcb6b;">GS-4 ⭕ Belt Fragment</b> · M4 ทำลาย!</div>`;
    Submit.record('p08c', { correct: correctCount, total: 5 });
    Gate.markSubmitted();
    const cBtn = document.querySelector('.submit-btn'); cBtn.disabled=true; cBtn.textContent='✓ เสร็จแล้ว';
    if(window.Coin && Coin.awardPerfect && correctCount===5) Coin.awardPerfect('p08c');
  } else {
    r.innerHTML = `<div class="card red">⚠ ${correctCount}/5 · ต้อง 4+ ลองใหม่</div>`;
    setTimeout(() => location.reload(), 2500);
  }
}

setTimeout(() => {
  Gate.wireButton('p08c', document.querySelector('.next-btn'), 'p09-bridge.html', { requireSubmit:true });
}, 200);
</script>
