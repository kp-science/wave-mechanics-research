  </div>

  <details class="tc"><summary>🎓 Teacher Cue · P09d</summary>

<div id="ebMount" style="margin:14px 0;"></div>
<script>
(function(){
  var el = document.getElementById('ebMount');
  if(!el || !window.ExplainBack) return;
  ExplainBack.mount(el, {
    pageId: document.body.dataset.page,
    prompt: 'อธิบาย · โครงสร้างของดาวยักษ์มีอะไรอยู่ตรงกลาง?',
    words: ['แก่นแข็ง', 'rock', 'น้ำแข็ง', 'โลหะไฮโดรเจน', 'แก๊สห่อหุ้ม', 'ความดัน', 'พฤหัส', 'เสาร์', 'ยูเรนัส', 'เนปจูน'],
    required: ['แก่นแข็ง', 'โลหะไฮโดรเจน', 'แก๊สห่อหุ้ม', 'ความดัน'],
    indicator: 'K3'
  });
})();
</script>


<div id="ljMount" style="margin:14px 0;"></div>
<script>
(function(){
  var el = document.getElementById('ljMount');
  if(!el || !window.Journal) return;
  Journal.mount(el, {
    pageId: document.body.dataset.page,
    sceneTitle: 'จดสมุด · 3-2-1 ปิด scene',
    learnedChips: ['ดาวยักษ์ 4 ดวง', 'พฤหัส 11× โลก', 'gas vs ice giant', 'แก่นแข็งกลาง', 'แก๊สห่อหุ้ม', 'โลก ≠ ใหญ่สุด'],
    useChips: ['อธิบาย M3 ผิด', 'รู้จัก Jovian planet', 'สนใจ Cassini Juno', 'เปรียบขนาดดาว'],
    askChips: ['ลงไปในพฤหัสได้ไหม', 'ทำไมเสาร์มีวงแหวน', 'โลหะ H เป็นยังไง', 'Great Red Spot คืออะไร']
  });
})();
</script>


<div id="cgMount" style="margin:14px 0;"></div>
<script>
(function(){
  var el = document.getElementById('cgMount');
  if(!el || !window.ConfidenceGate) return;
  ConfidenceGate.mount(el, {
    pageId: document.body.dataset.page,
    onConfirm: function(){
      var nb = document.getElementById('nextBtn');
      if (nb) { nb.disabled = false; nb.classList.add('gate-open'); nb.scrollIntoView({behavior:'smooth',block:'center'}); }
    }
  });
  // lock next until confirmed
  setTimeout(function(){
    var nb = document.getElementById('nextBtn');
    if (nb && !nb.disabled) {
      nb.dataset.cgLocked = '1';
      nb.disabled = true;
    }
  }, 250);
})();
</script>

  <div class="btn-pair">
    <button class="submit-btn" id="submitBtn">📤 ตรวจ</button>

  </div>
</div>

<script src="../shared/ep06-boot.js?v=1"></script>
<script>
const PROPS = [
  { t:'มวลส่วนใหญ่เป็น H + He', a:'gas' },
  { t:'มีน้ำแข็ง+มีเทน+แอมโมเนียมาก', a:'ice' },
  { t:'มีแก่นแข็ง (rock+ice core)', a:'both' },
  { t:'อยู่ในชั้นนอกของระบบสุริยะ', a:'both' },
  { t:'พฤหัส + เสาร์', a:'gas' },
  { t:'ยูเรนัส + เนปจูน', a:'ice' },
  { t:'ใหญ่กว่าโลกอย่างน้อย 4 เท่า (R)', a:'both' },
  { t:'มีระบบแหวน (น้อย/เยอะ)', a:'both' },
];
const ans = {};
const host = document.getElementById('propsHost');
PROPS.forEach((p,i) => {
  const c = document.createElement('div'); c.className='prop-cell'; c.dataset.i=i;
  c.innerHTML = `<div style="font-size:13px; line-height:1.5;">${p.t}</div>
    <div class="zone-pick">
      <button class="ghost" data-z="gas">GAS</button>
      <button class="ghost" data-z="ice">ICE</button>
      <button class="ghost" data-z="both">BOTH</button>
    </div>`;
  c.querySelectorAll('button').forEach(b => b.onclick = (e) => {
    e.stopPropagation();
    const z = b.dataset.z;
    ans[i] = z;
    c.classList.remove('gas','ice','both');
    c.classList.add(z);
  });
  host.appendChild(c);
});

setTimeout(() => {
  Submit.wirePair({
    page:'p09d', nextHref:'p10-bridge.html',
    getPayload(){
      let correct = 0;
      PROPS.forEach((p,i) => { if(ans[i]===p.a) correct++; });
      return { ans, correct, total:PROPS.length };
    },
    validate(p){ if(Object.keys(ans).length<PROPS.length){ alert('ตอบให้ครบ 8 ข้อ'); return false; } return true; },
    isPerfect(p){ return p.correct===p.total; },
    onSubmit(){
      let correct = 0;
      PROPS.forEach((p,i) => { if(ans[i]===p.a) correct++; });
      const r = document.getElementById('resultHost');
      if(correct >= 6){
        QuestState.grant('gs5');
        QuestState.decreaseEta(EP_CONFIG.voidEtaPerScene||0.6);
        r.innerHTML = `<div class="card green">✓ <b>GIANT BREAKDOWN PASSED</b> · ${correct}/8 · ปลด <b style="color:#ff8a3d;">GS-5 ☄ Giant's Heart</b> · M2 ทำลาย!</div>`;
      } else {
        r.innerHTML = `<div class="card red">⚠ ${correct}/8 · ต้อง 6+ ลองใหม่</div>`;
      }
    }
  });
}, 200);
</script>
</body></html>
