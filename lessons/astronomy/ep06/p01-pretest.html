<script>
// Pre-test 5 ข้อ · misconception (M) + วัตถุประสงค์ K
window.EP06_PRETEST_QS = [
  { m:'M1', q:'ระบบสุริยะประกอบด้วยอะไรบ้าง?',
    a:['ดวงอาทิตย์ + 8 ดาวเคราะห์เท่านั้น',
       'ดวงอาทิตย์ + ดาวเคราะห์ + ดาวเคราะห์น้อย + ดาวหาง + ดาวเคราะห์แคระ + บริวาร',
       'ดวงอาทิตย์อย่างเดียว',
       'กาแล็กซีทางช้างเผือกทั้งหมด'], c:1 },
  { m:'M2', q:'ดาวเคราะห์ชั้นนอก (พฤหัส-เนปจูน) ตรงแกนกลางมีอะไร?',
    a:['แก๊สล้วนถึงแกน',
       'มีแก่นแข็ง (rock+ice) ห่อด้วยแก๊ส/น้ำแข็ง',
       'ของเหลวร้อนหมุนวน',
       'ว่างเปล่าไม่มีอะไร'], c:1 },
  { m:'M5', q:'พลูโตจัดเป็นอะไรในปัจจุบัน (IAU 2006)?',
    a:['ดาวเคราะห์ดวงที่ 9',
       'ดาวเคราะห์แคระ (dwarf planet)',
       'ดาวบริวารของเนปจูน',
       'ดาวหางขนาดใหญ่'], c:1 },
  { m:'M6', q:'ขอบเขตของระบบสุริยะอยู่ที่ไหน?',
    a:['จบที่เนปจูน ~30 AU',
       'heliopause ~120 AU · Oort cloud ~70,000 AU',
       'เพียง 100 ล้าน กม.',
       '1 ปีแสง'], c:1 },
  { m:'M7', q:'เขตเอื้อชีวิต (Habitable zone) ขึ้นกับปัจจัยใดบ้าง?',
    a:['ระยะห่างจากดาวฤกษ์อย่างเดียว',
       'น้ำเหลว + อากาศ + อุณหภูมิเหมาะ + ระยะ + ชนิดดาวฤกษ์',
       'ดวงจันทร์เท่านั้น',
       'ขนาดของดาวเคราะห์'], c:1 },
];
const QS = window.EP06_PRETEST_QS;
const area = document.getElementById('quizArea');
QS.forEach((q,i) => {
  const card = document.createElement('div'); card.className='card';
  card.innerHTML = `<div class="q-prompt">ข้อ ${i+1} · <span style="font-size:11px;color:#9aa3c0;">[${q.m}]</span> ${q.q}</div>
    <div class="choice-row" data-q="${i}">
      ${q.a.map((t,k)=>`<label><input type="radio" name="q${i}" value="${k}"> <span>${t}</span></label>`).join('')}
    </div>`;
  area.appendChild(card);
});
setTimeout(() => {
  Submit.wirePair({
    page:'p01', nextHref:'p02-anomaly.html',
    getPayload(){
      const ans={}; let correct=0;
      QS.forEach((q,i)=>{
        const v=document.querySelector(`input[name="q${i}"]:checked`);
        const val = v?Number(v.value):-1;
        ans['q'+i]={m:q.m, ans:val, correct:val===q.c};
        if(val===q.c) correct++;
      });
      if (window.EPSync) {
        EPSync.submit({ ep:6, test:'pre', answers: QS.map((q,i)=>({
          id:'Q'+(i+1), mcode:q.m, ans:ans['q'+i].ans, correct:ans['q'+i].correct
        })) });
      }
      return {answers:ans, correct, total:QS.length};
    },
    validate(p){ if(Object.values(p.answers).some(a=>a.ans===-1)){ alert('กรุณาตอบให้ครบทุกข้อ'); return false; } return true; },
    isPerfect(p){ return p.correct===p.total; },
    onSubmit(){
      let correct = 0;
      QS.forEach((q,i) => { const v = document.querySelector(`input[name="q${i}"]:checked`); if (v && Number(v.value) === q.c) correct++; });
      const wrongs = QS.length - correct;
      if (window.MysteryBox && MysteryBox.roll) setTimeout(() => MysteryBox.roll({ wrongs, page:'p01' }), 600);
    }
  });
}, 200);
</script>
</body></html>
