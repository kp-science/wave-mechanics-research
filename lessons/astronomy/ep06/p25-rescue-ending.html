<script>
// Read grid-boss state (preferred) · fallback to old key
let bossState = null;
try { bossState = JSON.parse(localStorage.getItem('cosmosLog_ep06_boss_p24') || 'null'); } catch(e){}
const ending = (bossState && bossState.ending) || Chain.get('bossEnding') || 'B';
const stats = (bossState && bossState.stats) || {};
const achievements = (bossState && bossState.achievements) || [];
const ENDINGS = {
  'A+': { cls:'e-aplus', art:'🌟', t:'A+ · MASTER NAVIGATOR', d:'นำทีมถึง Genesis Vault อย่างสมบูรณ์ · ปฏิเสธคำหลอกของ VOID ทุกครั้ง · เห็นภาพระบบสุริยะตั้งแต่ดาวพุธไปถึง Oort Cloud 70,000 AU · บันทึกครบทุกแฟ้ม' },
  'A':  { cls:'e-a',     art:'✨', t:'A · STAR PILOT',        d:'ถึง Vault ปลอดภัย · เก็บข้อมูลส่วนใหญ่ · ระบบสุริยะปลอดภัย · ทีมพร้อมภารกิจถัดไป' },
  'B':  { cls:'e-b',     art:'⚡', t:'B · ROOKIE',            d:'รอดแบบฉิวเฉียด · ถึง Vault ได้แต่ข้อมูลบางส่วนสูญหาย · ยังต้องเรียนรู้และกลับมาเก็บ' },
  'C':  { cls:'e-c',     art:'💀', t:'C · LOST IN THE VOID',  d:'พลังหมดก่อนถึงเป้า · VOID ครอบครอง Vault · ต้องลองใหม่ · บทเรียนใหญ่ของทีม' },
};
const e = ENDINGS[ending] || ENDINGS['B'];
let statHtml = '';
if (stats && Object.keys(stats).length) {
  statHtml = `
    <div style="margin-top:14px;padding:10px;border-top:1px dashed rgba(255,255,255,0.25);font-size:12px;color:#d4f0ff;text-align:left;">
      <div>⚡ พลังคงเหลือ: <b>${stats.energy ?? '?'}/15</b></div>
      <div>📘 Knowledge เปิด: <b>${stats.knowledge ?? '?'}/${stats.knowledgeTotal ?? 45}</b></div>
      <div>🛡️ Trap หักล้าง: <b>${stats.trapsRefuted ?? 0}/${stats.trapsTotal ?? 15}</b></div>
      <div>🎁 Bonus เก็บ: <b>${stats.bonus ?? 0}/${stats.bonusTotal ?? 8}</b></div>
      <div>🔮 Phase 1 hints ใช้: <b>${stats.hintsP1 ?? 0}</b></div>
      <div>📡 Data points: <b>${stats.questionsAnswered ?? 0}</b></div>
    </div>`;
}
let achHtml = '';
if (achievements.length) {
  achHtml = `<div style="margin-top:12px;text-align:left;font-size:12px;color:#ffd700;">
    🏆 Achievement: ${achievements.join(' · ')}</div>`;
}
document.getElementById('endingHost').innerHTML = `
  <div class="ending-stage ${e.cls}">
    <div class="ending-art">${e.art}</div>
    <div class="ending-title">${e.t}</div>
    <div style="font-size:13px; line-height:1.7; color:#fff;">${e.d}</div>
    ${statHtml}
    ${achHtml}
  </div>`;

setTimeout(()=>{const btn=document.getElementById('nextBtn');Gate.soloMode(btn,'p26-satellite-fail.html');if(window.PaceClient)Gate.wireButton('p25',btn,'p26-satellite-fail.html');},200);
</script>
