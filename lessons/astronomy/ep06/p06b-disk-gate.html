.mat { padding:8px 12px; border-radius:10px; cursor:pointer; user-select:none;

.mat:hover { border-color:#fff; }
.mat.placed-correct { background:rgba(126,255,178,0.15); border-color:#7effb2; }
.mat.placed-wrong { background:rgba(255,92,122,0.12); border-color:#ff5c7a; animation:shake .35s; }
.mat-pool { display:flex; flex-wrap:wrap; gap:8px; padding:12px; border-radius:12px; background:rgba(0,0,0,0.4); border:1px dashed rgba(120,140,220,0.3); margin:10px 0; }
@keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }

  <details class="tc"><summary>🎓 Teacher Cue · P06b</summary>

<script>
const MATS = [
  { id:'iron',     n:'⚙️ เหล็ก (Fe)',    z:'inner' },
  { id:'silica',   n:'🪨 ซิลิเกต',         z:'inner' },
  { id:'rock',     n:'🪨 หินทนความร้อน',  z:'inner' },
  { id:'nickel',   n:'⚙️ นิกเกิล',        z:'inner' },
  { id:'water',    n:'❄️ น้ำแข็ง H₂O',    z:'outer' },
  { id:'methane',  n:'🟢 มีเทนแข็ง',       z:'outer' },
  { id:'ammonia',  n:'🔵 แอมโมเนียแข็ง',    z:'outer' },
  { id:'hydrogen', n:'💨 ไฮโดรเจน (H₂)',  z:'outer' },
];

let placed = {};
const pool = document.getElementById('pool');
MATS.slice().sort(() => Math.random()-0.5).forEach(m => {
  const el = document.createElement('div'); el.className='mat'; el.dataset.id = m.id;
  el.textContent = m.n;
  el.onclick = () => {
    if(placed[m.id]) return;
    // pick zone with quick-prompt
    const dlg = document.createElement('div');
    dlg.style.cssText='position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:300; display:flex; align-items:center; justify-content:center;';
    dlg.innerHTML = `
      <div style="background:#06091a; padding:18px; border-radius:14px; border:1px solid #64d8ff; max-width:300px;">
        <div style="font-size:13px; color:#fff; margin-bottom:10px;">${m.n}<br><span style="color:#9aa3c0; font-size:11px;">ใส่ฝั่งไหน?</span></div>
        <button class="ghost" data-z="inner" style="margin-right:6px;">🪨 INNER</button>
        <button class="ghost" data-z="outer">❄️ OUTER</button>
        <div style="margin-top:8px;"><button class="ghost" data-z="cancel" style="font-size:11px;">ยกเลิก</button></div>
      </div>`;
    document.body.appendChild(dlg);
    dlg.querySelectorAll('button').forEach(b => {
      b.onclick = () => {
        const z = b.dataset.z;
        dlg.remove();
        if(z === 'cancel') return;
        placed[m.id] = z;
        const correct = (z === m.z);
        el.classList.add(correct ? 'placed-correct' : 'placed-wrong');
        const targetBin = document.querySelector(`.drop-area[data-zone="${z}"]`);
        targetBin.appendChild(el);
        el.onclick = null;
        if(window.SFX) SFX.play(correct ? 'correct' : 'wrong');
      };
    });
  };
  pool.appendChild(el);
});

setTimeout(() => {
  Submit.wirePair({
    page:'p06b', nextHref:'p07-bridge.html',
    getPayload(){
      let correct = 0;
      MATS.forEach(m => { if(placed[m.id] === m.z) correct++; });
      return { placed, correct, total:MATS.length };
    },
    validate(p){
      if(Object.keys(placed).length < MATS.length){ alert('คัดให้ครบ 8 ชนิด'); return false; }
      return true;
    },
    isPerfect(p){ return p.correct === p.total; },
    onSubmit(tag){
      const r = document.getElementById('resultHost');
      let correct = 0;
      MATS.forEach(m => { if(placed[m.id] === m.z) correct++; });
      if(correct === MATS.length){
        QuestState.grant('gs2');
        QuestState.decreaseEta(EP_CONFIG.voidEtaPerScene || 0.6);
        r.innerHTML = '<div class="card green" style="margin-top:14px;">✓ <b>DISK SORTED</b> · ปลด <b style="color:#64d8ff;">GS-2 💍 Disk Ring</b></div>';
      } else {
        r.innerHTML = `<div class="card red" style="margin-top:14px;">⚠ ${correct}/${MATS.length} ถูก · ลองทบทวน frost line อีกครั้ง</div>`;
      }
    }
  });
}, 200);
</script>
</body></html>
