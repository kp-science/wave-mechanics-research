<!DOCTYPE html>
<html lang="th"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>EP04 · GRAVITY ASCENT</title>
<link rel="stylesheet" href="../shared/book.css?v=6">
<link rel="stylesheet" href="_page-style.css">
<style>
  body { padding-top:8px; }

  /* sticky climax bar (HUD) */
  .climax-bar { position:sticky; top:0; z-index:30; background:rgba(5,6,15,0.96); padding:10px 12px; backdrop-filter:blur(8px); border-bottom:1.5px solid rgba(255,92,122,0.4); margin:-50px -16px 0 -16px; }
  .climax-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; max-width:820px; margin:0 auto; }
  .hud { padding:8px 10px; background:rgba(0,0,0,0.5); border:1.5px solid #2a3050; border-radius:8px; }
  .hud .lbl { font-family:Orbitron,sans-serif; font-size:9px; letter-spacing:0.2em; color:#9aa3c0; }
  .hud .val { font-family:Orbitron,monospace; font-size:18px; font-weight:700; margin-top:1px; }
  .hud.energy .val { color:#7effb2; }
  .hud.energy.low .val { color:#ff5c7a; animation:flash 0.6s infinite; }
  .hud.thrust .val { color:#ffcb6b; }
  .hud.zone .val { color:#b980ff; font-size:14px; line-height:1.3; }
  @keyframes flash { 50% { opacity:0.4; } }

  .stage {
    background:radial-gradient(ellipse at center, #2a0a30 0%, #0a0418 40%, #000 100%);
    border:1.5px solid #b980ff; border-radius:14px; padding:24px 16px; margin:14px 0; position:relative; overflow:hidden;
    min-height:280px;
  }

  /* Black hole · pulsing */
  .blackhole {
    position:relative; width:160px; height:160px; margin:0 auto;
  }
  .bh-ring {
    position:absolute; inset:0; border-radius:50%;
    background:radial-gradient(circle at center,
      transparent 30%, #ff5c7a 40%, #ffcb6b 50%, #b980ff 65%, transparent 80%);
    animation:bhSpin 6s linear infinite;
  }
  @keyframes bhSpin { 100% { transform:rotate(360deg); } }
  .bh-core {
    position:absolute; inset:32%; border-radius:50%; background:#000;
    box-shadow:0 0 40px #b980ff, inset 0 0 16px #1a0830;
  }
  .charge-arc {
    position:absolute; inset:-12px; border-radius:50%;
    border:3px solid transparent; pointer-events:none;
    transition:border-color .2s;
  }
  .charge-arc.charging {
    background:conic-gradient(from 0deg, #ff5c7a 0%, #ff5c7a var(--angle, 0%), transparent var(--angle, 0%));
    border-radius:50%;
    -webkit-mask:radial-gradient(circle, transparent 65%, #000 67%);
            mask:radial-gradient(circle, transparent 65%, #000 67%);
  }

  .ship {
    position:absolute; left:14px; bottom:14px; font-size:32px;
    transition:left 1.4s ease, bottom 1.4s ease;
  }

  /* Question card */
  .qcard {
    padding:18px; background:linear-gradient(160deg, rgba(22,27,58,0.85), rgba(8,10,24,0.9));
    border:2px solid #ffcb6b; border-radius:14px; margin:14px 0;
    box-shadow:0 0 24px rgba(255,203,107,0.2);
  }
  .qcard .tier { display:inline-block; padding:3px 10px; font-family:Orbitron; font-size:10px;
                 letter-spacing:0.2em; border-radius:10px; margin-bottom:6px; }
  .qcard .tier.easy { color:#7effb2; border:1px solid #7effb2; background:rgba(126,255,178,0.06); }
  .qcard .tier.hard { color:#ff5c7a; border:1px solid #ff5c7a; background:rgba(255,92,122,0.06); }
  .qprompt { font-size:18px; font-weight:700; color:#ffe2a8; line-height:1.6; margin:8px 0 12px; }

  .answer-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media(max-width:540px) { .answer-row { grid-template-columns:1fr; } }
  .ans-btn {
    padding:18px; min-height:70px;
    background:rgba(100,216,255,0.08); border:2px solid #64d8ff; color:#e8ecf8;
    border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit;
    transition:all .15s; -webkit-tap-highlight-color:transparent; touch-action:manipulation;
  }
  .ans-btn:hover:not(:disabled) { background:rgba(100,216,255,0.18); transform:translateY(-2px); }
  .ans-btn.correct { border-color:#7effb2; background:rgba(126,255,178,0.25); color:#bcffd6; }
  .ans-btn.wrong { border-color:#ff5c7a; background:rgba(255,92,122,0.25); color:#ffb5c2; }

  /* feedback popup */
  .pop { position:absolute; font-family:Orbitron,monospace; font-size:22px; font-weight:700;
         pointer-events:none; animation:popUp 1s ease-out forwards; z-index:50; }
  .pop.thrust { color:#7effb2; text-shadow:0 0 14px #7effb2; }
  .pop.energy { color:#ff5c7a; text-shadow:0 0 14px #ff5c7a; }
  .pop.minus { color:#ff8fa5; }
  @keyframes popUp { 0% { opacity:0; transform:translateY(0); } 30% { opacity:1; } 100% { opacity:0; transform:translateY(-50px); } }

  /* shake */
  .shake { animation:shake .4s; }
  @keyframes shake { 0%,100% { transform:translate(0); } 25% { transform:translate(-6px,2px); } 75% { transform:translate(6px,-2px); } }

  /* zone progress bar */
  .zone-track { display:flex; gap:6px; margin:8px 0; }
  .zone-cell { flex:1; padding:8px 4px; background:rgba(0,0,0,0.4); border:1px solid #2a3050; border-radius:8px;
               text-align:center; font-family:Orbitron; font-size:10px; color:#6a7394; letter-spacing:0.05em; }
  .zone-cell.active { background:rgba(185,128,255,0.15); border-color:#b980ff; color:#b980ff; box-shadow:0 0 14px rgba(185,128,255,0.3); }
  .zone-cell.done { background:rgba(126,255,178,0.08); border-color:#7effb2; color:#7effb2; }

  /* ending screen */
  .ending {
    padding:30px 20px; text-align:center;
    border-radius:14px; margin:14px 0;
  }
  .ending.aplus { background:linear-gradient(135deg, rgba(255,203,107,0.18), rgba(255,143,165,0.12)); border:2px solid #ffcb6b; box-shadow:0 0 40px rgba(255,203,107,0.3); }
  .ending.a    { background:linear-gradient(135deg, rgba(126,255,178,0.15), rgba(100,216,255,0.1)); border:2px solid #7effb2; }
  .ending.b    { background:linear-gradient(135deg, rgba(100,216,255,0.12), rgba(60,80,140,0.1)); border:2px solid #64d8ff; }
  .ending.c    { background:linear-gradient(135deg, rgba(255,92,122,0.18), rgba(60,20,40,0.1)); border:2px solid #ff5c7a; }
  .ending h2 { font-size:28px; letter-spacing:0.18em; margin:8px 0; }
  .ending .sub { color:#e8ecf8; font-size:15px; line-height:1.7; margin:8px 0 14px; }

  /* intro overlay */
  .intro-ovl { position:fixed; inset:0; background:#000d; z-index:200; display:flex; align-items:center; justify-content:center; flex-direction:column;
               animation:introFade .8s; }
  .intro-ovl .text { font-family:Orbitron; font-size:34px; color:#ff5c7a; letter-spacing:0.18em; text-shadow:0 0 30px #ff5c7a; text-align:center; padding:0 24px; }
  .intro-ovl .sub { color:#d4b8ff; font-size:14px; margin-top:14px; }
  @keyframes introFade { from { opacity:0; } }

  /* zone enter overlay */
  .zone-ovl { position:fixed; inset:0; background:#000c; z-index:180; display:none; align-items:center; justify-content:center; flex-direction:column; }
  .zone-ovl.show { display:flex; animation:zoneIn .6s; }
  .zone-ovl .text { font-family:Orbitron; font-size:30px; letter-spacing:0.2em; text-align:center; padding:0 24px; }
  @keyframes zoneIn { from { opacity:0; transform:scale(0.8); } }
</style>
</head>
<body data-page="p24" data-type="mixed">

<!-- Intro overlay -->
<div class="intro-ovl" id="introOvl">
  <div class="text">⚠ GRAVITY ASCENT ⚠</div>
  <div class="sub">ขับยานฝ่าหลุมดำ · ตอบให้ถูก · กู้พ่อกลับมา</div>
  <button class="btn" style="margin-top:24px; min-width:200px;" onclick="startBoss()">▶ START</button>
</div>

<!-- Zone transition overlay -->
<div class="zone-ovl" id="zoneOvl">
  <div class="text" id="zoneOvlText"></div>
</div>

<div class="climax-bar">
  <div class="climax-row">
    <div class="hud zone"><div class="lbl">ZONE</div><div class="val" id="zoneLabel">1 · OUTER</div></div>
    <div class="hud thrust"><div class="lbl">THRUST · ZONE</div><div class="val" id="thrustVal">0/30</div></div>
    <div class="hud energy"><div class="lbl">ENERGY</div><div class="val" id="energyVal">100</div></div>
  </div>
  <div class="zone-track" style="max-width:820px; margin:8px auto 0;">
    <div class="zone-cell active" id="zc1">🌑 Z1 · สี/อุณหภูมิ</div>
    <div class="zone-cell" id="zc2">🌌 Z2 · มวล/ปลายทาง</div>
    <div class="zone-cell" id="zc3">⚫ Z3 · บูรณาการ</div>
  </div>
</div>

<div class="page">
  <div class="stage" id="stage">
    <div class="blackhole">
      <div class="bh-ring"></div>
      <div class="charge-arc" id="chargeArc"></div>
      <div class="bh-core"></div>
    </div>
    <div class="ship" id="ship">🚀</div>
  </div>

  <div class="qcard" id="qcard" style="display:none;">
    <span class="tier easy" id="qtier">EASY</span>
    <div class="qprompt" id="qprompt">...</div>
    <div class="answer-row">
      <button class="ans-btn" id="ansA" onclick="answer(0)">A</button>
      <button class="ans-btn" id="ansB" onclick="answer(1)">B</button>
    </div>
  </div>

  <div class="ending" id="endingBox" style="display:none;"></div>

  <div class="btn-pair" id="finalBtns" style="display:none;">
    <button class="submit-btn" id="submitBtn">📤 บันทึกผล Boss</button>
    <button class="next-btn" id="nextBtn" disabled>🔒 บันทึกก่อน</button>
  </div>
  <div class="gate-hint" id="gateHint" style="display:none;">บันทึกผล → ปลดล็อกไป Frame Dragging</div>
</div>

<script src="../shared/firebase-config.js"></script>
<script src="./config.js"></script>
<script src="../../shared/pace-client.js"></script>
<script src="../shared/sync-client.js"></script>
<script src="../shared/photon.js?v=2"></script>
<script src="../shared/role-view.js"></script>
<script src="../shared/starfield.js?v=1"></script>
<script src="../shared/audio.js?v=2"></script>
<script src="../shared/mission-brief.js?v=1"></script>
<script src="../shared/mystery-box.js?v=1"></script>
<script src="../shared/ep04-boot.js?v=2"></script>
<script>
/* ===== State ===== */
const BOSS = EP_CONFIG.boss;
const POOLS = BOSS.pools;
const ZONE_NAMES = ['1 · OUTER · สี/อุณหภูมิ', '2 · MIDDLE · มวล/ปลายทาง', '3 · INNER · บูรณาการ'];
const ZONE_KEYS = ['zone1','zone2','zone3'];
let zoneIdx = 0;
let zoneThrust = 0;
let energy = BOSS.startEnergy;
let used = { zone1:[], zone2:[], zone3:[] }; // pool tracking
let chargeTimer = null;
let chargeStart = 0;
let qActive = false;
let answers = []; // log
let started = false;
const inv = (Chain.get('shop.purchased')) || [];
const hasBlackDwarf = inv.includes('blackDwarf');
const hasSpectroPro = inv.includes('spectroPro');
const hasMassSensor = inv.includes('massSensor');
let massSensorUsed = false;

function startBoss(){
  document.getElementById('introOvl').style.display='none';
  started = true;
  showZoneIntro(0);
}

function showZoneIntro(i){
  const ovl = document.getElementById('zoneOvl');
  const txt = document.getElementById('zoneOvlText');
  const colors = ['#9bb8ff','#ffd96b','#b980ff'];
  txt.style.color = colors[i];
  txt.style.textShadow = '0 0 30px ' + colors[i];
  txt.innerHTML = `ZONE ${i+1}<br><span style="font-size:14px; color:#fff; letter-spacing:0.1em;">${['สี · อุณหภูมิ · OBAFGKM','มวล ↔ ปลายทาง','มวล vs อายุ + บูรณาการ'][i]}</span>`;
  ovl.classList.add('show');
  setTimeout(()=>{ ovl.classList.remove('show'); nextQuestion(); startCharge(); }, 1400);
}

function startCharge(){
  if (chargeTimer) clearInterval(chargeTimer);
  chargeStart = Date.now();
  document.getElementById('chargeArc').classList.add('charging');
  chargeTimer = setInterval(()=>{
    const elapsed = (Date.now() - chargeStart) / 1000;
    const pct = Math.min(100, (elapsed / BOSS.chargeIntervalSec) * 100);
    document.getElementById('chargeArc').style.setProperty('--angle', pct + '%');
    if (elapsed >= BOSS.chargeIntervalSec) {
      gravityHit();
      chargeStart = Date.now();
    }
  }, 100);
}

function gravityHit(){
  energy = Math.max(0, energy - BOSS.chargeDamage);
  showPop('-' + BOSS.chargeDamage, 'energy', getStageRect());
  document.getElementById('stage').classList.add('shake');
  setTimeout(()=>document.getElementById('stage').classList.remove('shake'), 400);
  updateHUD();
  if (energy <= 0) endBoss();
}

function getRandomQ(){
  const key = ZONE_KEYS[zoneIdx];
  const pool = POOLS[key];
  // pick remaining first
  let avail = pool.map((_,i)=>i).filter(i=>!used[key].includes(i));
  if (avail.length === 0) { used[key] = []; avail = pool.map((_,i)=>i); }
  const ri = avail[Math.floor(Math.random()*avail.length)];
  used[key].push(ri);
  return { ...pool[ri], _idx: ri, _zone: zoneIdx };
}

let curQ = null;
function nextQuestion(){
  curQ = getRandomQ();
  const card = document.getElementById('qcard');
  card.style.display = 'block';
  document.getElementById('qprompt').innerHTML = curQ.q;
  const tier = document.getElementById('qtier');
  tier.textContent = curQ.tier === 'easy' ? 'EASY · +5 thrust' : 'HARD · +8 thrust';
  tier.className = 'tier ' + curQ.tier;
  const a = document.getElementById('ansA');
  const b = document.getElementById('ansB');
  a.textContent = 'A · ' + curQ.a[0];
  b.textContent = 'B · ' + curQ.a[1];
  a.disabled = false; b.disabled = false;
  a.classList.remove('correct','wrong');
  b.classList.remove('correct','wrong');
  qActive = true;
}

function answer(i){
  if (!qActive) return;
  qActive = false;
  const correct = (i === curQ.c);
  const a = document.getElementById('ansA');
  const b = document.getElementById('ansB');
  [a,b].forEach((btn,j) => {
    btn.disabled = true;
    if (j === curQ.c) btn.classList.add('correct');
    else if (j === i && !correct) btn.classList.add('wrong');
  });

  let delta = 0;
  if (correct) {
    delta = (curQ.tier === 'easy') ? BOSS.thrustEasy : BOSS.thrustHard;
    if (zoneIdx === 0 && hasSpectroPro) delta += 5;
  } else {
    delta = BOSS.thrustWrong;
    if (zoneIdx === 1 && hasMassSensor && !massSensorUsed) {
      massSensorUsed = true;
      delta = 0;
      showPop('🛡️ Sensor', 'thrust', getStageRect());
    }
  }
  zoneThrust = Math.max(0, zoneThrust + delta);
  showPop((delta>=0?'+':'') + delta + ' thrust', delta>=0?'thrust':'minus', getStageRect());
  answers.push({ zone:zoneIdx, q:curQ.q, picked:i, correct, delta });
  updateHUD();

  // Check if zone advance
  if (zoneThrust >= BOSS.thrustPerZone) {
    setTimeout(()=>advanceZone(), 800);
  } else {
    setTimeout(()=>nextQuestion(), 800);
  }
}

function advanceZone(){
  // mark this zone done
  document.getElementById('zc'+(zoneIdx+1)).classList.remove('active');
  document.getElementById('zc'+(zoneIdx+1)).classList.add('done');
  zoneIdx++;
  zoneThrust = 0;
  if (zoneIdx >= 3) {
    endBoss();
    return;
  }
  document.getElementById('zc'+(zoneIdx+1)).classList.add('active');
  // move ship visually
  const ship = document.getElementById('ship');
  ship.style.left = (14 + zoneIdx * 30) + '%';
  updateHUD();
  showZoneIntro(zoneIdx);
}

function endBoss(){
  if (chargeTimer) clearInterval(chargeTimer);
  document.getElementById('qcard').style.display = 'none';
  document.getElementById('chargeArc').classList.remove('charging');

  let ending = 'C';
  if (energy >= BOSS.endingThresholds['A+']) ending = 'A+';
  else if (energy >= BOSS.endingThresholds['A']) ending = 'A';
  else if (energy >= BOSS.endingThresholds['B']) ending = 'B';
  // A+ requires Black Dwarf
  if (ending === 'A+' && !hasBlackDwarf) ending = 'A';

  Chain.set('boss.result', { ending, energy, answers });

  const box = document.getElementById('endingBox');
  box.style.display = 'block';
  const meta = {
    'A+': { cls:'aplus', t:'🏆 A+ STAR LEGACY', s:'พ่อปลอดภัย · ยานสมบูรณ์ · Black Dwarf Shell ป้องกัน GRB ได้ทัน' },
    'A':  { cls:'a',     t:'🥇 A FATHER\'S RETURN', s:'กู้พ่อกลับมาได้ · ยานบาดเจ็บแต่ไม่ถึงตาย' },
    'B':  { cls:'b',     t:'🥈 B BARELY ALIVE', s:'หนีรอดด้วยพลังงานเฮือกสุดท้าย · พ่อยังต้องช่วยอีกครั้ง' },
    'C':  { cls:'c',     t:'🔁 C SWALLOWED', s:'ยานพังในสนามแรงโน้มถ่วง · ลองใหม่อีกครั้ง?' },
  }[ending];
  box.className = 'ending ' + meta.cls;
  box.innerHTML = `<h2>${meta.t}</h2><div class="sub">${meta.s}</div>` +
    `<div style="font-family:monospace; color:#9aa3c0; font-size:13px;">Energy เหลือ ${energy} · ตอบ ${answers.filter(a=>a.correct).length}/${answers.length} ข้อถูก</div>`;
  document.getElementById('finalBtns').style.display = 'grid';
  document.getElementById('gateHint').style.display = 'block';
  // wire submit + next
  document.getElementById('submitBtn').onclick = () => {
    Submit.record('p24', { ending, energy, answers });
    document.getElementById('submitBtn').classList.add('done');
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').textContent = '✓ บันทึกแล้ว';
    Gate.markSubmitted();
  };
  setTimeout(()=>{
    Gate.wireButton('p24', document.getElementById('nextBtn'), 'p25-rescue.html', { requireSubmit:true });
  }, 100);
}

function updateHUD(){
  document.getElementById('zoneLabel').textContent = ZONE_NAMES[Math.min(zoneIdx,2)];
  document.getElementById('thrustVal').textContent = zoneThrust + '/' + BOSS.thrustPerZone;
  document.getElementById('energyVal').textContent = energy;
  const eHud = document.querySelector('.hud.energy');
  eHud.classList.toggle('low', energy < 30);
}

function getStageRect(){
  const s = document.getElementById('stage');
  const r = s.getBoundingClientRect();
  return { x: r.left + r.width/2, y: r.top + 40 };
}

function showPop(text, cls, pos){
  const p = document.createElement('div');
  p.className = 'pop ' + cls;
  p.textContent = text;
  p.style.left = (pos.x - 30) + 'px';
  p.style.top = pos.y + 'px';
  p.style.position = 'fixed';
  document.body.appendChild(p);
  setTimeout(()=>p.remove(), 1100);
}

updateHUD();
</script>
</body></html>
